<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resolution Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(rgba(9,9,11,0.78), rgba(9,9,11,0.94)), 
                  url('https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&w=2000&q=80') center/cover no-repeat fixed;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .chat-container { background: rgba(15, 23, 42, 0.93); backdrop-filter: blur(25px); }
    .message-user { background: #2563eb; color: white; border-radius: 20px 20px 6px 20px; }
    .message-bot { background: #1e2937; border-radius: 20px 20px 20px 6px; border: 1px solid rgba(245, 158, 11, 0.05); }
    .prompt-btn {
      padding: 11px 18px; margin-bottom: 8px; background: #334155; 
      border-radius: 9999px; cursor: pointer; transition: all 0.2s;
    }
    .prompt-btn:hover { background: #475569; transform: translateX(6px); }
    .faint-overlay {
      position: absolute; inset: 0; 
      background: radial-gradient(circle at 50% 30%, rgba(245, 158, 11, 0.09), transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .oval-header { border-radius: 9999px; background: rgba(15, 23, 42, 0.95); }
    #chat { scrollbar-width: thin; scrollbar-color: #475569 #111827; }
    .sanskrit-verse { color: #fbbf24; font-weight: 600; margin: 8px 0; line-height: 1.65; font-size: 1.05em; }
  </style>
</head>
<body class="h-screen w-screen text-gray-100 flex overflow-hidden">

  <!-- Collapsible Sidebar -->
  <div id="sidebar" class="w-72 bg-zinc-950/95 backdrop-blur-md border-r border-zinc-800 flex flex-col h-full transition-all duration-300 z-20">
    <div class="p-5 flex items-center justify-between border-b border-zinc-800">
      <div class="font-semibold text-xl tracking-tight">Resolution Planner</div>
      <button onclick="toggleSidebar()" class="text-zinc-400 hover:text-white p-1">
        <i class="fas fa-bars text-xl"></i>
      </button>
    </div>

    <div class="p-4">
      <button onclick="newChat()" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-semibold py-3.5 rounded-2xl flex items-center justify-center gap-2 transition-all">
        <i class="fas fa-plus"></i> New Conversation
      </button>
    </div>

    <!-- Quick Prompts -->
    <div class="px-4 flex-1 overflow-y-auto">
      <p class="text-amber-400 text-xs mb-3 px-3 font-semibold tracking-wider">QUICK PROMPTS</p>
      <div onclick="sendPrompt('Explain Karma from Gita')" class="prompt-btn text-sm">Karma explained</div>
      <div onclick="sendPrompt('What is Dharma?')" class="prompt-btn text-sm">Dharma meaning</div>
      <div onclick="sendPrompt('Verse on equanimity and inner balance')" class="prompt-btn text-sm">Verse on balance</div>
      <div onclick="sendPrompt('How to handle fear and anxiety')" class="prompt-btn text-sm">Handling anxiety</div>
    </div>

    <!-- Saved Resolutions -->
    <div class="px-4 pb-6 border-t border-zinc-800 pt-4">
      <p class="text-amber-400 text-xs mb-3 px-3 font-semibold tracking-wider">💾 SAVED RESOLUTIONS</p>
      <div id="saved-list" class="text-sm space-y-1 max-h-64 overflow-y-auto pr-2"></div>
    </div>
  </div>

  <!-- Main Area -->
  <div class="flex-1 flex flex-col chat-container relative h-full">
    <!-- Header -->
    <div class="oval-header mx-4 mt-4 px-6 py-4 flex items-center justify-between border border-amber-400/10 shadow-lg z-10">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-amber-400 to-orange-500 rounded-2xl flex items-center justify-center text-2xl font-bold text-zinc-950 shadow-md">ॐ</div>
        <div>
          <div class="text-xl font-bold tracking-tight">Inner Peace &amp; Happiness</div>
          <div class="text-xs text-amber-200/70">Create calm, clear resolutions to difficult situations</div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="fetchRandomGitaVerse()" 
                class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2.5 rounded-3xl text-sm font-medium transition-all">
          <i class="fas fa-book"></i> Random Verse
        </button>
        <button onclick="openSettings()" class="w-10 h-10 flex items-center justify-center text-zinc-400 hover:text-amber-300 rounded-3xl hover:bg-zinc-800">
          <i class="fas fa-cog text-xl"></i>
        </button>
      </div>
    </div>

    <!-- Chat Area -->
    <div id="chat" class="flex-1 p-6 overflow-y-auto space-y-6 relative min-h-0">
      <div class="faint-overlay"></div>
    </div>

    <!-- Input -->
    <div class="p-5 border-t border-zinc-800/80 bg-zinc-900/95 z-10">
      <form onsubmit="sendMessage(event)" class="relative max-w-4xl mx-auto">
        <input id="userInput" type="text" autocomplete="off"
               class="w-full bg-zinc-800 border border-zinc-700/80 rounded-3xl px-7 py-4.5 pr-16 focus:outline-none focus:border-amber-400 text-base placeholder-zinc-500 shadow-inner"
               placeholder="Describe your situation or ask a question...">
        <button type="submit" 
                class="absolute right-3 top-1/2 -translate-y-1/2 bg-amber-500 hover:bg-amber-600 text-black w-11 h-11 rounded-2xl flex items-center justify-center transition-all">
          <i class="fas fa-paper-plane"></i>
        </button>
      </form>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    let savedResolutions = JSON.parse(localStorage.getItem('savedResolutions')) || [];

    function renderSaved() {
      const container = document.getElementById('saved-list');
      container.innerHTML = savedResolutions.length === 0 
        ? '<p class="text-zinc-500 text-xs px-3">No saved resolutions yet</p>' 
        : '';
      
      savedResolutions.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = "prompt-btn text-sm flex justify-between items-center group";
        div.innerHTML = `
          <span onclick="loadSaved(${i})" class="cursor-pointer flex-1">${item.name}</span>
          <span onclick="deleteSaved(${i}); event.stopImmediatePropagation()" class="text-red-400 hover:text-red-500 opacity-0 group-hover:opacity-100 text-lg leading-none">×</span>
        `;
        container.appendChild(div);
      });
    }

    function saveCurrentResponse(name, html) {
      if (!name) name = "Resolution " + new Date().toLocaleDateString();
      savedResolutions.unshift({ name, html, timestamp: Date.now() });
      if (savedResolutions.length > 15) savedResolutions.pop();
      localStorage.setItem('savedResolutions', JSON.stringify(savedResolutions));
      renderSaved();
    }

    function loadSaved(index) {
      appendMessage('bot', savedResolutions[index].html);
    }

    function deleteSaved(index) {
      savedResolutions.splice(index, 1);
      localStorage.setItem('savedResolutions', JSON.stringify(savedResolutions));
      renderSaved();
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('w-72');
      sidebar.classList.toggle('w-16');
    }

    function appendMessage(sender, html) {
      const div = document.createElement('div');
      div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full`;
      div.innerHTML = `
        <div class="max-w-[82%] ${sender === 'user' ? 'message-user' : 'message-bot'} px-6 py-4 text-[15.5px] leading-relaxed shadow-md">
          ${html}
          ${sender === 'bot' ? `<button onclick="saveCurrentResponse(prompt('Give this resolution a name:'), this.parentElement.innerHTML)" class="mt-4 text-xs px-4 py-1.5 bg-amber-400/10 hover:bg-amber-400/20 text-amber-400 rounded-2xl transition">💾 Save this Resolution</button>` : ''}
        </div>
      `;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function buildVerseHTML(title, chapter, verse, slok, translation) {
      const formattedSlok = slok ? `<span class="sanskrit-verse">${slok.replace(/\n/g, '<br>')}</span>` : '';
      return `
        <strong class="text-amber-400 block mb-2">${title} (Chapter ${chapter}, Verse ${verse})</strong>
        ${formattedSlok}
        <div class="text-zinc-300 italic border-l-2 border-amber-500/40 pl-4 mt-3">"${translation}"</div>
      `;
    }

    async function getVerse(chapter, verse) {
      try {
        const res = await fetch(`https://bhagavadgitaapi.in/slok/${chapter}/${verse}/`);
        const data = await res.json();
        return {
          slok: data.slok,
          translation: data.siva?.et || data.purohit?.et || data.tej?.ht || "Wisdom from the Gita"
        };
      } catch(e) {
        return { slok: "ॐ", translation: "The soul is eternal and beyond the body..." };
      }
    }

    async function sendMessage(e) {
      if (e) e.preventDefault();
      const input = document.getElementById('userInput');
      const msg = input.value.trim();
      if (!msg) return;

      appendMessage('user', msg);
      input.value = '';

      const thinking = document.createElement('div');
      thinking.className = 'flex justify-start w-full';
      thinking.innerHTML = `<div class="message-bot px-6 py-4 text-amber-400">Contemplating...</div>`;
      chat.appendChild(thinking);
      chat.scrollTop = chat.scrollHeight;

      // Intelligent chapter mapping for variety
      let chapter = 2;
      const lower = msg.toLowerCase();
      if (lower.includes('karma') || lower.includes('action')) chapter = 3;
      else if (lower.includes('dharma') || lower.includes('duty')) chapter = [2,18][Math.floor(Math.random()*2)];
      else if (lower.includes('balance') || lower.includes('equanimity')) chapter = 2;
      else if (lower.includes('fear') || lower.includes('anxiety')) chapter = 2;

      const verse = Math.floor(Math.random() * 35) + 1;
      const data = await getVerse(chapter, verse);

      thinking.remove();
      const html = buildVerseHTML("Gita Guidance", chapter, verse, data.slok, data.translation);
      appendMessage('bot', html);
    }

    function sendPrompt(prompt) {
      appendMessage('user', prompt);
      setTimeout(() => {
        const thinking = document.createElement('div');
        thinking.className = 'flex justify-start w-full';
        thinking.innerHTML = `<div class="message-bot px-6 py-4 text-amber-400">Contemplating...</div>`;
        chat.appendChild(thinking);
        chat.scrollTop = chat.scrollHeight;

        setTimeout(async () => {
          thinking.remove();
          const chapter = Math.floor(Math.random() * 18) + 1;
          const verse = Math.floor(Math.random() * 40) + 1;
          const data = await getVerse(chapter, verse);
          const html = buildVerseHTML(prompt, chapter, verse, data.slok, data.translation);
          appendMessage('bot', html);
        }, 600);
      }, 100);
    }

    async function fetchRandomGitaVerse() {
      const loading = document.createElement('div');
      loading.className = 'flex justify-start w-full';
      loading.innerHTML = `<div class="message-bot px-6 py-4 text-amber-400">Finding a verse...</div>`;
      chat.appendChild(loading);
      chat.scrollTop = chat.scrollHeight;

      const chapter = Math.floor(Math.random() * 18) + 1;
      const verse = Math.floor(Math.random() * 40) + 1;
      const data = await getVerse(chapter, verse);

      loading.remove();
      appendMessage('bot', buildVerseHTML("Random Verse", chapter, verse, data.slok, data.translation));
    }

    function newChat() {
      chat.innerHTML = `<div class="faint-overlay"></div>`;
      appendMessage('bot', `Welcome to <strong>Inner Peace &amp; Happiness</strong>.<br>Describe your situation and I will bring relevant wisdom from the Bhagavad Gita.`);
    }

    function openSettings() {
      alert("Resolution Planner Settings\n\n• Chat History\n• Export Saved Resolutions\n• Theme Options");
    }

    window.onload = () => {
      renderSaved();
      newChat();
    };
  </script>
</body>
</html>
