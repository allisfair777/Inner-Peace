<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resolution Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background-color: #09090b;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .chat-container {
      background: rgba(9, 9, 11, 0.88);
      backdrop-filter: blur(30px);
    }
    .message-user {
      background: #1d4ed8;
      color: white;
      border-radius: 20px 20px 6px 20px;
    }
    .message-bot {
      background: #18181b;
      border-radius: 20px 20px 20px 6px;
      border: 1px solid rgba(245, 158, 11, 0.08);
    }
    .prompt-btn {
      padding: 11px 18px;
      margin-bottom: 8px;
      background: #27272a;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .prompt-btn:hover {
      background: #3f3f46;
      transform: translateX(4px);
    }
    .faint-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 25%, rgba(245, 158, 11, 0.05), transparent 75%);
      pointer-events: none;
      z-index: 0;
    }
    .oval-header {
      border-radius: 9999px;
      background: rgba(24, 24, 27, 0.95);
    }
    #chat {
      scrollbar-width: thin;
      scrollbar-color: #3f3f46 #09090b;
    }
    .sanskrit-verse {
      display: block;
      color: #fbbf24;
      font-weight: 600;
      margin-top: 6px;
      margin-bottom: 6px;
      line-height: 1.6;
      font-size: 1.05em;
    }
    .sidebar-transition {
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease, border-color 0.3s ease;
    }
    .animate-spin-slow {
      animation: spin 12s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="h-screen w-screen text-gray-100 flex overflow-hidden bg-cover bg-center bg-no-repeat bg-fixed">

  <div id="sidebar" class="w-72 bg-zinc-950/95 border-r border-zinc-800 flex flex-col h-full z-20 sidebar-transition overflow-hidden shrink-0">
    <div class="p-5 flex items-center justify-between border-b border-zinc-800 shrink-0 w-72">
      <div class="font-semibold text-xl tracking-tight text-zinc-200">Resolution Planner</div>
      <button onclick="toggleSidebar()" class="text-zinc-400 hover:text-amber-400">
        <i class="fas fa-chevron-left text-sm"></i>
      </button>
    </div>

    <div class="p-4 shrink-0 w-72">
      <button onclick="newChat()" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-semibold py-3.5 rounded-2xl flex items-center justify-center gap-2 transition-all">
        <i class="fas fa-plus"></i> New Conversation
      </button>
    </div>

    <div class="px-4 flex-1 overflow-y-auto pb-4 w-72">
      <p class="text-amber-400/80 text-xs mb-3 px-3 font-semibold tracking-wider">QUICK PROMPTS</p>
      <div onclick="sendPrompt('Explain Karma from Gita')" class="prompt-btn text-sm text-zinc-300">Karma explained</div>
      <div onclick="sendPrompt('What is Dharma?')" class="prompt-btn text-sm text-zinc-300">Dharma meaning</div>
      <div onclick="sendPrompt('Verse on equanimity and inner balance')" class="prompt-btn text-sm text-zinc-300">Verse on balance</div>
      <div onclick="sendPrompt('How to handle fear and anxiety')" class="prompt-btn text-sm text-zinc-300">Handling anxiety</div>

      <div class="mt-8">
        <p class="text-amber-400/80 text-xs mb-3 px-3 font-semibold tracking-wider">SAVED PROMPTS</p>
        <div id="saved-prompts-list" class="space-y-2">
          </div>
      </div>
    </div>
  </div>

  <div class="flex-1 flex flex-col chat-container relative h-full min-w-0">
    
    <div class="oval-header mx-4 mt-4 px-6 py-4 flex items-center justify-between border border-zinc-800/60 shadow-xl z-10">
      <div class="flex items-center gap-4">
        <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center text-zinc-400 hover:text-amber-300 rounded-3xl hover:bg-zinc-800 transition-all">
          <i class="fas fa-bars text-lg"></i>
        </button>
        <div class="w-10 h-10 bg-gradient-to-br from-amber-400 to-orange-500 rounded-2xl flex items-center justify-center text-2xl font-bold text-zinc-950 shadow-md">ॐ</div>
        <div class="hidden sm:block">
          <div class="text-xl font-bold tracking-tight text-zinc-100">Inner Peace &amp; Happiness</div>
          <div class="text-xs text-amber-200/60">Create calm, clear resolutions to difficult situations</div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="fetchRandomGitaVerse()" 
                class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 hover:text-amber-300 px-5 py-2.5 rounded-3xl text-sm font-medium transition-all">
          <i class="fas fa-book"></i>
          <span class="hidden sm:inline">Random Verse</span>
        </button>
        <button onclick="openSettings()" class="w-10 h-10 flex items-center justify-center text-zinc-400 hover:text-amber-300 rounded-3xl hover:bg-zinc-800 transition-all">
          <i class="fas fa-cog text-xl"></i>
        </button>
      </div>
    </div>

    <div id="chat" class="flex-1 p-6 overflow-y-auto space-y-5 relative min-h-0">
      <div class="faint-overlay"></div>
    </div>

    <div class="p-5 border-t border-zinc-800/50 bg-zinc-950/80 z-10">
      <form onsubmit="sendMessage(event)" class="relative max-w-4xl mx-auto">
        <input id="userInput" type="text" autocomplete="off"
               class="w-full bg-zinc-900 border border-zinc-800 rounded-3xl px-7 py-4.5 pr-16 focus:outline-none focus:border-amber-500 text-base placeholder-zinc-500 text-zinc-100 shadow-inner transition-all"
               placeholder="Describe your situation or ask a question...">
        <button type="submit" 
                class="absolute right-3 top-1/2 -translate-y-1/2 bg-amber-500 hover:bg-amber-600 active:scale-95 text-black w-11 h-11 rounded-2xl flex items-center justify-center transition-all shadow-md">
          <i class="fas fa-paper-plane"></i>
        </button>
      </form>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');

    const wisdomDb = {
      karma: [
        {
          title: "Wisdom on Action & Purpose", ch: 3, verse: 19,
          slok: "तस्मादसक्तः सततम् कार्यम् कर्म समाचर।\nअसक्तो ह्याचरन्कर्म परमाप्नोति पूरुषः॥",
          translation: "Therefore, without attachment, always perform the actions that ought to be done; for by performing actions without attachment, one attains the supreme state."
        },
        {
          title: "The Path of Action", ch: 2, verse: 47,
          slok: "कर्मण्येवाधिकारस्ते मा फलेषु कदाचन।\nमा कर्मफलहेतुर्भूर्मा ते सङ्गोऽस्त्वकर्मणि॥",
          translation: "You have a right to perform your prescribed duties, but you are never entitled to the fruits of your actions. Never consider yourself to be the cause of the results of your activities, nor be attached to inaction."
        }
      ],
      dharma: [
        {
          title: "Wisdom on Natural Duty", ch: 18, verse: 47,
          slok: "श्रेयानस्वधर्मो विगुणः परधर्मात्स्वनुष्ठितात्।\nस्वभावनियतं कर्म कुर्वन्नाप्नोति किल्बिषम्॥",
          translation: "It is far better to perform one’s own natural duties, even if imperfectly, than to master the duties of another. Engaging in work mapped to your true nature brings no internal conflict."
        },
        {
          title: "Upholding Righteousness", ch: 4, verse: 8,
          slok: "परित्राणाय साधूनां विनाशाय च दुष्कृताम्।\nधर्मसंस्थापनार्थाय सम्भवामि युगे युगे॥",
          translation: "To deliver the pious and to annihilate the miscreants, as well as to reestablish the principles of religion, I Myself appear, millennium after millennium."
        }
      ],
      balance: [
        {
          title: "Wisdom on Equanimity", ch: 2, verse: 48,
          slok: "योगस्थः कुरु कर्माणि सङ्गं त्यक्त्वा धनञ्जय।\nसिद्ध्यसिद्ध्योः समो भूत्वा समत्वं योग उच्यते॥",
          translation: "Be steadfast in your path, abandoning all anxious attachment to success or failure. Such balance and evenness of mind is the true essence of Yoga."
        },
        {
          title: "The Peaceful Mind", ch: 2, verse: 70,
          slok: "आपूर्यमाणमचलप्रतिष्ठं समुद्रमापः परविशन्ति यद्वत्।\nतद्वत्कामा यं परविशन्ति सर्वे स शान्तिमाप्नोति न कामकामी॥",
          translation: "Just as the ocean remains undisturbed by the continuous flow of rivers entering it, a person who remains unmoved by the torrent of desires achieves deep peace."
        }
      ],
      anxiety: [
        {
          title: "Wisdom on Overcoming Anxiety", ch: 2, verse: 14,
          slok: "मात्रास्पर्शास्तु कौन्तेय शीतोष्णसुखदुःखदाः।\nआगमापायिनोऽनित्यास्तांस्तितिक्षस्व भारत॥",
          translation: "The sensory contacts with external things give rise to temporary feelings of pleasure and pain. They come and go like the changing seasons. Observe and tolerate them without letting them shake your core."
        },
        {
          title: "Freedom from Fear", ch: 18, verse: 66,
          slok: "सर्वधर्मान्परित्यज्य मामेकं शरणं व्रज।\nअहं त्वां सर्वपापेभ्यो मोक्षयिष्यामि मा शुचः॥",
          translation: "Abandon all varieties of operational anxieties and simply surrender into the cosmic flow. Do not fear, do not grieve."
        }
      ]
    };

    const randomVersePool = [
      { ch: 6, verse: 5, slok: "उद्धरेदात्मनात्मानं नात्मानमवसादयेत्।\nआत्मैव ह्यात्मनो बन्धुरात्मैव रिपुरात्मनः॥", translation: "Let a man lift himself up by his own mind; let him not degrade himself. For the mind is the friend of the self, and the mind can be the enemy of the self." },
      { ch: 5, verse: 21, slok: "बाह्यस्पर्शेष्वसक्तात्मा विन्दत्यात्मनि यत्सुखम्।\nस ब्रह्मयोगयुक्तात्मा सुखमक्षयमश्नुते॥", translation: "One who is unattached to external sensory pleasures finds true happiness within. Self-connected, they experience endless joy." }
    ];

    /* 1) Seamless Sidebar Toggle Switch Logic */
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (sidebar.classList.contains('w-72')) {
        sidebar.className = "w-0 border-transparent opacity-0 flex flex-col h-full z-20 sidebar-transition overflow-hidden shrink-0";
      } else {
        sidebar.className = "w-72 bg-zinc-950/95 border-r border-zinc-800 flex flex-col h-full z-20 sidebar-transition overflow-hidden shrink-0";
      }
    }

    /* 2) Structured LocalStorage Engine for Custom Saved Prompts */
    let savedPrompts = JSON.parse(localStorage.getItem('gitaSavedPrompts')) || [];

    function renderSavedPrompts() {
      const container = document.getElementById('saved-prompts-list');
      if (savedPrompts.length === 0) {
        container.innerHTML = '<div class="text-zinc-600 text-xs px-3 italic">No saved prompts yet.</div>';
        return;
      }
      container.innerHTML = savedPrompts.map((p, index) => `
        <div class="prompt-btn text-sm flex justify-between items-center relative overflow-hidden group" title="${p.prompt}">
          <div class="truncate flex-1 pr-2 py-0.5" onclick="sendPrompt('${p.prompt.replace(/'/g, "\\'")}')">
            ${p.name}
          </div>
          <button onclick="event.stopPropagation(); deleteSavedPrompt(${index})" class="text-zinc-500 hover:text-red-400 transition-colors px-1 z-10">
            <i class="fas fa-trash-alt text-xs"></i>
          </button>
        </div>
      `).join('');
    }

    function bookmarkPrompt(promptText) {
      const name = prompt("Give this prompt a descriptive name to save it:");
      if (name && name.trim() !== "") {
        savedPrompts.push({ name: name.trim(), prompt: promptText });
        localStorage.setItem('gitaSavedPrompts', JSON.stringify(savedPrompts));
        renderSavedPrompts();
      }
    }

    function deleteSavedPrompt(index) {
      if (confirm("Remove this configuration from saved items?")) {
        savedPrompts.splice(index, 1);
        localStorage.setItem('gitaSavedPrompts', JSON.stringify(savedPrompts));
        renderSavedPrompts();
      }
    }

    /* 4 & 5) Optimized Muted Calming Wallpapers */
    function setupDynamicBackground() {
      const backgroundImages = [
        'https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&w=1400&q=60',
        'https://images.unsplash.com/photo-1518241353330-0f7941c2d9b5?auto=format&fit=crop&w=1400&q=60',
        'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1400&q=60'
      ];
      const selectedImg = backgroundImages[Math.floor(Math.random() * backgroundImages.length)];
      // Applied highly muted overlay mix (0.88 to 0.94) to match the elegant backdrop style
      document.body.style.backgroundImage = `linear-gradient(rgba(9, 9, 11, 0.88), rgba(9, 9, 11, 0.94)), url('${selectedImg}')`;
    }

    function appendMessage(sender, html, rawPromptText = null) {
      const div = document.createElement('div');
      div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full`;
      
      let bookmarkBtnHTML = '';
      if (sender === 'user' && rawPromptText) {
        const safeText = rawPromptText.replace(/'/g, "\\'").replace(/"/g, "&quot;");
        bookmarkBtnHTML = `
          <div class="mt-2 pt-1.5 border-t border-white/10 flex justify-end">
            <button onclick="bookmarkPrompt('${safeText}')" class="text-[11px] text-amber-300/80 hover:text-amber-300 flex items-center gap-1 bg-white/5 px-2 py-0.5 rounded-md transition-all">
              <i class="fas fa-bookmark text-[10px]"></i> Save Action
            </button>
          </div>
        `;
      }

      div.innerHTML = `
        <div class="max-w-[82%] ${sender === 'user' ? 'message-user' : 'message-bot'} px-6 py-4 text-[15.5px] leading-relaxed shadow-md">
          <div>${html}</div>
          ${bookmarkBtnHTML}
        </div>
      `;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function matchIntentData(text) {
      const lower = text.toLowerCase();
      let matchedArray = null;

      if (lower.includes('karma') || lower.includes('action') || lower.includes('deeds')) matchedArray = wisdomDb.karma;
      else if (lower.includes('dharma') || lower.includes('duty') || lower.includes('purpose')) matchedArray = wisdomDb.dharma;
      else if (lower.includes('equanimity') || lower.includes('balance') || lower.includes('peace') || lower.includes('calm')) matchedArray = wisdomDb.balance;
      else if (lower.includes('fear') || lower.includes('anxious') || lower.includes('worry') || lower.includes('panic') || lower.includes('stress')) matchedArray = wisdomDb.anxiety;

      if (matchedArray) {
        return matchedArray[Math.floor(Math.random() * matchedArray.length)];
      }

      const randomFallback = randomVersePool[Math.floor(Math.random() * randomVersePool.length)];
      return {
        title: "Personalized Guidance Reflection",
        ch: randomFallback.ch,
        verse: randomFallback.verse,
        slok: randomFallback.slok,
        translation: `Reflecting on "${text}": ${randomFallback.translation}`
      };
    }

    function buildVerseHTML(title, chapter, verse, slok, translation) {
      const formattedSlok = slok ? `<span class="sanskrit-verse">${slok.replace(/\n/g, '<br>')}</span>` : '';
      return `
        <strong class="text-amber-400 block mb-2">${title} (Chapter ${chapter}, Verse ${verse})</strong>
        ${formattedSlok}
        <div class="text-zinc-300 italic border-l-2 border-amber-500/40 pl-3 mt-3">"${translation}"</div>
      `;
    }

    async function sendMessage(e, explicitText = null) {
      if (e && e.preventDefault) e.preventDefault();
      
      const input = document.getElementById('userInput');
      const msg = explicitText ? explicitText.trim() : input.value.trim();
      if (!msg) return;

      appendMessage('user', msg, msg);
      if (!explicitText) input.value = '';

      const thinking = document.createElement('div');
      thinking.className = 'flex justify-start w-full';
      thinking.innerHTML = `<div class="message-bot px-6 py-4 text-amber-400 font-medium animate-pulse">Contemplating the verses...</div>`;
      chat.appendChild(thinking);
      chat.scrollTop = chat.scrollHeight;

      const matched = matchIntentData(msg);

      try {
        const res = await fetch(`https://bhagavadgitaapi.in/slok/${matched.ch}/${matched.verse}/`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        
        thinking.remove();
        appendMessage('bot', buildVerseHTML(matched.title, matched.ch, matched.verse, data.slok, data.siva?.et || data.purohit?.et || data.tej?.ht || matched.translation));
      } catch (err) {
        thinking.remove();
        appendMessage('bot', buildVerseHTML(matched.title, matched.ch, matched.verse, matched.slok, matched.translation));
      }
    }

    function sendPrompt(promptText) {
      setTimeout(() => sendMessage(null, promptText), 80);
    }

    async function fetchRandomGitaVerse() {
      const totalChapterVerses = { 1:47, 2:72, 3:43, 4:42, 5:29, 6:47, 7:30, 8:28, 9:34, 10:42, 11:55, 12:20, 13:35, 14:27, 15:20, 16:24, 17:28, 18:78 };
      const randomChapter = Math.floor(Math.random() * 18) + 1;
      const randomVerse = Math.floor(Math.random() * totalChapterVerses[randomChapter]) + 1;

      const loadingMsg = document.createElement('div');
      loadingMsg.className = 'flex justify-start w-full';
      loadingMsg.innerHTML = `<div class="message-bot px-6 py-4 text-amber-400 font-medium animate-pulse">Opening a random chapter...</div>`;
      chat.appendChild(loadingMsg);
      chat.scrollTop = chat.scrollHeight;

      try {
        const res = await fetch(`https://bhagavadgitaapi.in/slok/${randomChapter}/${randomVerse}/`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        
        loadingMsg.remove();
        appendMessage('bot', buildVerseHTML("Random Verse Selection", randomChapter, randomVerse, data.slok, data.siva?.et || data.purohit?.et || data.tej?.ht || "Wisdom is unfolding."));
      } catch (e) {
        loadingMsg.remove();
        const structuralFallback = randomVersePool[Math.floor(Math.random() * randomVersePool.length)];
        appendMessage('bot', buildVerseHTML("Random Verse Selection (Local Archive)", structuralFallback.ch, structuralFallback.verse, structuralFallback.slok, structuralFallback.translation));
      }
    }

    /* 3) Custom Dynamic Dashboard initialized with classic Chariot Backdrop artwork overlay */
    function newChat() {
      chat.innerHTML = `
        <div class="faint-overlay"></div>
        <div class="max-w-xl mx-auto mt-10 p-8 rounded-3xl bg-zinc-900/80 border border-zinc-800/80 backdrop-blur-md text-center relative overflow-hidden shadow-2xl">
          <div class="absolute inset-0 opacity-10 bg-cover bg-center mix-blend-luminosity pointer-events-none" 
               style="background-image: url('https://images.unsplash.com/photo-1609137144813-7d7881005ca7?auto=format&fit=crop&w=800&q=50');">
          </div>
          <div class="relative z-10 flex flex-col items-center justify-center gap-4">
            <div class="w-14 h-14 bg-amber-500/10 border border-amber-500/20 text-amber-400 rounded-2xl flex items-center justify-center text-2xl shadow-inner">
              <i class="fas fa-dharmachakra animate-spin-slow"></i>
            </div>
            <h3 class="text-xl font-bold text-zinc-100 tracking-tight">New Conversation Initialized</h3>
            <p class="text-zinc-400 text-sm leading-relaxed max-w-sm">
              Share your current configuration, dilemma, or structural struggle to pull balanced action items directly from the open Gita ledger.
            </p>
            <div class="mt-3 text-[11.5px] text-amber-400/50 italic border-t border-zinc-800/80 pt-4 w-full">
              "Faced with crisis on the battlefield of life, the dialogue between the soul and higher consciousness begins."
            </div>
          </div>
        </div>
      `;
    }

    function openSettings() {
      alert("System Settings - Resolution Planner Engine is running optimally.");
    }

    window.onload = () => {
      setupDynamicBackground();
      renderSavedPrompts();
      appendMessage('bot', `Welcome to <strong>Inner Peace &amp; Happiness</strong>.<br>Describe whatever challenges or transitions you are balancing right now. I will query the open Gita ledger dynamically to build your custom action resolutions.`);
    };
  </script>
</body>
</html>
