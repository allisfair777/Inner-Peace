<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resolution Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background-color: #09090b; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
    .chat-container { background: rgba(9, 9, 11, 0.88); backdrop-filter: blur(30px); }
    .message-user { background: #f4efe2; color: #1c1917; border-radius: 20px 20px 6px 20px; font-weight: 500; }
    .message-bot { background: #18181b; border-radius: 20px 20px 20px 6px; border: 1px solid rgba(245, 158, 11, 0.08); }
    .prompt-btn { padding: 11px 18px; margin-bottom: 8px; background: #27272a; border-radius: 9999px; font-size: 0.875rem; color: #e4e4e7; border: 1px solid #3f3f46; transition: all 0.2s; text-align: left; width: 100%; display: flex; align-items: center; justify-content: justify; }
    .prompt-btn:hover { background: #3f3f46; color: #fff; border-color: #52525b; transform: translateY(-1px); }
    
    @keyframes subtle-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.7; }
    }
    .pulse-glow { animation: subtle-pulse 2s infinite ease-in-out; }
  </style>
</head>
<body class="text-zinc-100 flex h-screen overflow-hidden antialiased">

  <div id="sidebarOverlay" onclick="closeSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden backdrop-blur-sm transition-opacity duration-300 opacity-0"></div>

  <aside id="sidebar" class="fixed inset-y-0 left-0 w-80 bg-zinc-950 border-r border-zinc-800/80 z-50 transform -translate-x-full transition-transform duration-300 cubic-bezier(0.4, 0, 0.2, 1) flex flex-col">
    <div class="p-4 border-b border-zinc-900 flex items-center justify-between bg-zinc-950/50 backdrop-blur-md">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center shadow-lg shadow-amber-500/10">
          <i class="fa-solid fa-dharmachakra text-xs text-white"></i>
        </div>
        <div>
          <h2 class="font-bold text-sm text-zinc-100 tracking-tight">Gita Ledger</h2>
          <p class="text-[10px] text-zinc-500 font-medium tracking-wider uppercase">700 Verses Matrix</p>
        </div>
      </div>
      <button onclick="closeSidebar()" class="w-8 h-8 rounded-lg flex items-center justify-center text-zinc-400 hover:text-zinc-200 hover:bg-zinc-900 transition-colors">
        <i class="fa-solid fa-xmark text-sm"></i>
      </button>
    </div>

    <div class="p-4 border-b border-zinc-900 bg-zinc-950/30">
      <div class="flex gap-2">
        <input type="number" id="chapInput" placeholder="Ch (1-18)" min="1" max="18" class="w-20 bg-zinc-900 border border-zinc-800 rounded-xl px-2 py-2 text-xs text-zinc-200 focus:outline-none focus:border-amber-500/50">
        <input type="number" id="verseInput" placeholder="Verse" min="1" class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl px-2 py-2 text-xs text-zinc-200 focus:outline-none focus:border-amber-500/50">
        <button onclick="handleSidebarLookup()" class="px-3 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 text-xs font-semibold rounded-xl transition-colors">Go</button>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 space-y-6 custom-scrollbar">
      <div>
        <h4 class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-2.5 px-1">Yoga Frameworks</h4>
        <div class="space-y-1">
          <button onclick="selectYoga('Karma')" class="w-full text-left px-3 py-2 rounded-xl text-xs font-medium text-zinc-400 hover:text-zinc-200 hover:bg-zinc-900/60 transition-colors flex items-center justify-between">
            <span>Karma Yoga (Action)</span>
            <span class="text-[10px] bg-zinc-900 px-2 py-0.5 rounded text-zinc-500">Ch. 3</span>
          </button>
          <button onclick="selectYoga('Jnana')" class="w-full text-left px-3 py-2 rounded-xl text-xs font-medium text-zinc-400 hover:text-zinc-200 hover:bg-zinc-900/60 transition-colors flex items-center justify-between">
            <span>Jnana Yoga (Knowledge)</span>
            <span class="text-[10px] bg-zinc-900 px-2 py-0.5 rounded text-zinc-500">Ch. 4</span>
          </button>
          <button onclick="selectYoga('Bhakti')" class="w-full text-left px-3 py-2 rounded-xl text-xs font-medium text-zinc-400 hover:text-zinc-200 hover:bg-zinc-900/60 transition-colors flex items-center justify-between">
            <span>Bhakti Yoga (Devotion)</span>
            <span class="text-[10px] bg-zinc-900 px-2 py-0.5 rounded text-zinc-500">Ch. 12</span>
          </button>
        </div>
      </div>

      <div>
        <h4 class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-2.5 px-1">Common Crossroads</h4>
        <div class="space-y-1.5">
          <button onclick="sendPrompt('I am feeling completely overwhelmed by stress and fear of failure.')" class="w-full text-left p-2.5 rounded-xl bg-zinc-900/30 border border-zinc-900 hover:border-zinc-800 hover:bg-zinc-900/60 transition-all text-xs text-zinc-400 hover:text-zinc-200 line-clamp-2">
            😟 Overwhelmed by anxiety or fear
          </button>
          <button onclick="sendPrompt('I have to make a tough decision and I\'m terrified of choosing wrong.')" class="w-full text-left p-2.5 rounded-xl bg-zinc-900/30 border border-zinc-900 hover:border-zinc-800 hover:bg-zinc-900/60 transition-all text-xs text-zinc-400 hover:text-zinc-200 line-clamp-2">
            ⚖️ Paralyzed by a major life choice
          </button>
          <button onclick="sendPrompt('How can I do my job passionately without obsessing over outcomes?')" class="w-full text-left p-2.5 rounded-xl bg-zinc-900/30 border border-zinc-900 hover:border-zinc-800 hover:bg-zinc-900/60 transition-all text-xs text-zinc-400 hover:text-zinc-200 line-clamp-2">
            💼 Detaching from outcomes at work
          </button>
        </div>
      </div>
    </div>
  </aside>

  <div class="flex-1 flex flex-col h-full relative chat-container">
    
    <header class="h-16 border-b border-zinc-800/50 flex items-center justify-between px-4 z-30 bg-zinc-950/20 backdrop-blur-md">
      <div class="flex items-center gap-3">
        <div class="relative">
          <button onclick="toggleSidebar()" class="w-10 h-10 rounded-xl bg-zinc-900/80 border border-zinc-800/80 flex flex-col items-center justify-center text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 transition-all shadow-inner group">
            <i class="fa-solid fa-bars-staggered text-sm transition-transform group-hover:scale-105"></i>
          </button>
          <span id="menuPulseDot" class="pulse-glow absolute -top-1 -right-1 w-3 h-3 bg-amber-500 rounded-full border-2 border-zinc-950 shadow-md pointer-events-none hidden"></span>
          <span id="menuPulseText" class="pulse-glow absolute top-12 left-1/2 -translate-x-1/2 bg-zinc-900/90 border border-amber-500/30 text-[9px] font-bold text-amber-400 px-1.5 py-0.5 rounded whitespace-nowrap tracking-wider shadow-xl hidden">START HERE</span>
        </div>
        <div>
          <h1 class="text-sm font-bold text-zinc-100 tracking-tight flex items-center gap-1.5">
            Resolution Planner <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
          </h1>
          <p class="text-[11px] text-zinc-400 font-medium">Dynamic Gita Wisdom Ledger Integration</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="newChat()" class="text-xs font-semibold px-3 py-2 bg-zinc-900 border border-zinc-800 text-zinc-300 hover:text-white hover:bg-zinc-800 rounded-xl transition-all flex items-center gap-1.5">
          <i class="fa-solid fa-plus text-[10px]"></i> New Chat
        </button>
      </div>
    </header>

    <main id="chat" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 max-w-4xl w-full mx-auto pb-32">
      </main>

    <div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-zinc-950 via-zinc-950/95 to-transparent pt-10 pb-6 px-4 z-20">
      <div class="max-w-3xl w-full mx-auto">
        <div class="relative bg-zinc-900/90 border border-zinc-800/80 rounded-2xl p-2 shadow-2xl backdrop-blur-lg focus-within:border-amber-500/40 focus-within:ring-1 focus-within:ring-amber-500/20 transition-all">
          <textarea id="userInput" rows="1" placeholder="Describe whatever challenges or transitions you are balancing right now..." 
                    class="w-full bg-transparent border-0 outline-none text-sm text-zinc-200 placeholder-zinc-500 resize-none pl-3 pr-12 pt-2.5 max-h-32 custom-scrollbar focus:ring-0 focus:outline-none"
                    onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); handleSend(); }"></textarea>
          <div class="flex items-center justify-between border-t border-zinc-800/50 mt-2 pt-2 px-1">
            <span class="text-[10px] text-zinc-500 font-medium">Equipped with automated context mapping engine</span>
            <button onclick="handleSend()" class="h-8 px-4 bg-amber-600 hover:bg-amber-500 active:bg-amber-700 text-zinc-950 font-bold text-xs rounded-xl shadow-lg shadow-amber-600/10 transition-all flex items-center gap-1">
              Analyze <i class="fa-solid fa-bolt text-[9px]"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const chat = document.getElementById('chat');
    const userInput = document.getElementById('userInput');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const chapInput = document.getElementById('chapInput');
    const verseInput = document.getElementById('verseInput');
    const menuPulseDot = document.getElementById('menuPulseDot');
    const menuPulseText = document.getElementById('menuPulseText');

    const wisdomDb = {
      anxiety: { ch: 2, vs: 47, topic: "Anxiety & Outcome Attachment", tag: "Action Strategy" },
      stress: { ch: 2, vs: 47, topic: "Anxiety & Outcome Attachment", tag: "Action Strategy" },
      fear: { ch: 2, vs: 40, topic: "Fear & Uncertainty Mitigation", tag: "Protection" },
      grief: { ch: 2, vs: 11, topic: "Grief & Impermanence", tag: "Existential Clarity" },
      decision: { ch: 2, vs: 7, topic: "Dilemmas & Surrender", tag: "Leadership" },
      confused: { ch: 2, vs: 7, topic: "Dilemmas & Surrender", tag: "Leadership" },
      work: { ch: 3, vs: 19, topic: "Selfless Performance", tag: "Professional Duty" },
      purpose: { ch: 18, vs: 47, topic: "Swadharma / Personal Calling", tag: "Authenticity" }
    };

    function getOvalHTML() {
      return `
        <div class="message-bot p-6 max-w-3xl mx-auto relative overflow-hidden border border-zinc-800/40 shadow-xl bg-zinc-950/40 rounded-2xl">
          <div class="absolute inset-0 opacity-10 pointer-events-none" 
               style="background-image: url('https://images.unsplash.com/photo-1609137144813-7d7881005ca7?auto=format&fit=crop&w=1200&q=50'); background-size: cover; background-position: center;">
          </div>
          <div class="relative z-10 flex flex-col items-center justify-center gap-4">
            
            <div class="rounded-2xl p-1 bg-gradient-to-br from-amber-400 to-orange-500 shadow-lg overflow-hidden w-32 h-32 md:w-40 md:h-40">
              <img src="krishna-arjuna.jpg" alt="Krishna and Arjuna" class="w-full h-full rounded-xl object-cover">
            </div>

            <h3 class="text-xl font-bold text-zinc-100 tracking-tight">Welcome to Inner Peace</h3>
            <p class="text-zinc-400 text-sm leading-relaxed max-w-2xl px-4 text-center">
              Describe whatever challenges or transitions you are balancing right now. I will query the open Gita ledger dynamically to build your custom action resolutions.
            </p>
            <div class="text-xs text-amber-400/50 italic border-t border-zinc-800/80 pt-4 w-full mt-2 text-center">
              "In the battlefield of life, wisdom begins when we pause and listen."
            </div>
          </div>
        </div>
      `;
    }

    function initMenuPrompt() {
      if (!localStorage.getItem('gita_menu_prompt_dismissed')) {
        menuPulseDot.classList.remove('hidden');
        menuPulseText.classList.remove('hidden');
      }
    }

    function dismissMenuPrompt() {
      localStorage.setItem('gita_menu_prompt_dismissed', 'true');
      menuPulseDot.classList.add('hidden');
      menuPulseText.classList.add('hidden');
    }

    function toggleSidebar() {
      dismissMenuPrompt();
      const isOpen = !sidebar.classList.contains('-translate-x-full');
      if (isOpen) closeSidebar(); else openSidebar();
    }

    function openSidebar() {
      sidebar.classList.remove('-translate-x-full');
      sidebarOverlay.classList.remove('hidden');
      setTimeout(() => sidebarOverlay.classList.add('opacity-100'), 10);
    }

    function closeSidebar() {
      sidebar.classList.add('-translate-x-full');
      sidebarOverlay.classList.remove('opacity-100');
      setTimeout(() => sidebarOverlay.classList.add('hidden'), 300);
    }

    function newChat() {
      closeSidebar();
      chat.innerHTML = getOvalHTML();
      userInput.value = '';
    }

    async function fetchVerseData(ch, vs) {
      const response = await fetch(`https://bhagavadgitaapi.in/slok/${ch}/${vs}/`);
      if (!response.ok) throw new Error("Network response encountered unexpected error");
      return await response.json();
    }

    function appendMessage(text, isUser) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `p-4 max-w-2xl ${isUser ? 'message-user ml-auto shadow-sm' : 'message-bot mr-auto shadow-md'}`;
      if (isUser) {
        msgDiv.textContent = text;
      } else {
        msgDiv.innerHTML = text;
      }
      chat.appendChild(msgDiv);
      chat.scrollTop = chat.scrollHeight;
    }

    async function processResolution(ch, vs, contextQuery = "") {
      appendMessage(`<strong>Analyzing Request Matrix...</strong><br><span class="text-xs text-zinc-500">Querying open ledger repository for Ch ${ch}, Sloka ${vs}...</span>`, false);
      const searchingIndicator = chat.lastChild;

      try {
        const data = await fetchVerseData(ch, vs);
        
        let resolutionHTML = `
          <div class="border-b border-zinc-800/60 pb-3 mb-3">
            <div class="flex items-center justify-between mb-1">
              <span class="text-xs font-bold text-amber-400 uppercase tracking-wider">Ledger Verification Found</span>
              <span class="text-xs font-semibold bg-zinc-900 px-2 py-0.5 rounded text-zinc-400">Chapter ${ch}, Verse ${vs}</span>
            </div>
            <p class="text-base font-medium text-amber-100/90 italic class="font-sans"">${data.slok.replace(/\n/g, '<br>')}</p>
          </div>
          <div class="space-y-3.5 text-zinc-300 text-sm">
            <div>
              <span class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest block mb-0.5">Transliteration</span>
              <p class="leading-relaxed text-zinc-400 italic">${data.transliteration.replace(/\n/g, '<br>')}</p>
            </div>
            <div>
              <span class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest block mb-0.5">Resolution Interpretation</span>
              <p class="leading-relaxed text-zinc-200">${data.purohit.et}</p>
            </div>
        `;

        if (contextQuery) {
          resolutionHTML += `
            <div class="bg-zinc-900/40 rounded-xl p-3 border border-zinc-800/40 mt-2">
              <span class="text-[10px] font-bold text-amber-400/80 uppercase tracking-widest block mb-1">Contextual Integration Strategy</span>
              <p class="text-xs text-zinc-400 leading-relaxed">Applying this directly to your issue: <em>"${contextQuery}"</em>. Sri Krishna explicitly advises shifting the focal priority away from variable outcomes and consolidating processing power strictly onto structural duties within your immediate control.</p>
            </div>
          `;
        }

        resolutionHTML += `</div>`;
        searchingIndicator.innerHTML = resolutionHTML;

      } catch (err) {
        searchingIndicator.innerHTML = `
          <div class="text-rose-400 text-sm font-semibold flex items-center gap-2">
            <i class="fa-solid fa-circle-exclamation"></i> Ledger Error: Could not retrieve Chapter ${ch}, Verse ${vs} at this time. Network may be down.
          </div>
        `;
      }
      chat.scrollTop = chat.scrollHeight;
    }

    function handleSend() {
      const text = userInput.value.trim();
      if (!text) return;

      appendMessage(text, true);
      userInput.value = '';
      userInput.style.height = 'auto';

      const sanitized = text.toLowerCase();
      
      // Strict regex matching to parse dynamic instructions
      const parsedMatch = text.match(/\b(?:ch(?:apter)?)\s*([1-9]|1[0-8])\s*(?:v(?:erse)?|s(?:loka)?|:|,)?\s*([1-9][0-9]?)\b/i);
      if (parsedMatch) {
        const ch = parseInt(parsedMatch[1], 10);
        const vs = parseInt(parsedMatch[2], 10);
        processResolution(ch, vs, text);
        return;
      }

      let found = null;
      for (const key in wisdomDb) {
        if (sanitized.includes(key)) {
          found = wisdomDb[key];
          break;
        }
      }

      if (found) {
        processResolution(found.ch, found.vs, text);
      } else {
        processResolution(2, 47, text); // Absolute fallback default execution
      }
    }

    function sendPrompt(promptText) {
      closeSidebar();
      userInput.value = promptText;
      handleSend();
    }

    function handleSidebarLookup() {
      const ch = parseInt(chapInput.value, 10);
      const vs = parseInt(verseInput.value, 10);
      if (ch >= 1 && ch <= 18 && vs > 0) {
        closeSidebar();
        processResolution(ch, vs, `Direct ledger lookup configuration via navigation dashboard.`);
        chapInput.value = '';
        verseInput.value = '';
      } else {
        alert("Please ensure index matrices are configured accurately (Chapter: 1-18, Verse: Positive Whole Integer)");
      }
    }

    function selectYoga(type) {
      closeSidebar();
      if (type === 'Karma') processResolution(3, 19, "Exploring selfless action alignment workflows.");
      else if (type === 'Jnana') processResolution(4, 38, "Exploring structural knowledge pathways.");
      else if (type === 'Bhakti') processResolution(12, 8, "Exploring pure devotion structures.");
    }

    userInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });

    chat.innerHTML = getOvalHTML();
    initMenuPrompt();
  </script>
</body>
</html>
