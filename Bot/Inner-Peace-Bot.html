<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inner Peace & Happiness</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background-color: #09090b;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .chat-container {
      background: rgba(9, 9, 11, 0.88);
      backdrop-filter: blur(30px);
    }
    .message-user {
      background: #f4efe2;
      color: #1c1917;
      border-radius: 20px 20px 6px 20px;
      font-weight: 500;
    }
    .message-bot {
      background: #18181b;
      border-radius: 20px 20px 20px 6px;
      border: 1px solid rgba(245, 158, 11, 0.08);
    }
    .prompt-btn {
      padding: 11px 18px;
      margin-bottom: 8px;
      background: #27272a;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .prompt-btn:hover {
      background: #3f3f46;
      transform: translateX(4px);
    }
    .faint-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 25%, rgba(245, 158, 11, 0.05), transparent 75%);
      pointer-events: none;
      z-index: 0;
    }
    .oval-header {
      border-radius: 9999px;
      background: rgba(24, 24, 27, 0.95);
    }
    #chat {
      scrollbar-width: thin;
      scrollbar-color: #3f3f46 #09090b;
    }
    .sanskrit-verse {
      display: block;
      color: #fbbf24;
      font-weight: 600;
      margin-top: 6px;
      margin-bottom: 6px;
      line-height: 1.6;
      font-size: 1.05em;
    }
    .sidebar-transition {
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease, border-color 0.3s ease;
    }
    .animate-spin-slow {
      animation: spin 16s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="h-screen w-screen text-gray-100 flex overflow-hidden bg-cover bg-center bg-no-repeat bg-fixed">

  <div id="sidebar" class="w-72 bg-zinc-950/95 border-r border-zinc-800 flex flex-col h-full z-20 sidebar-transition overflow-hidden shrink-0">
    <div class="p-5 flex items-center justify-between border-b border-zinc-800 shrink-0 w-72">
      <div class="font-semibold text-xl tracking-tight text-zinc-200">Resolution Planner</div>
      <button onclick="toggleSidebar()" class="text-zinc-400 hover:text-amber-400">
        <i class="fas fa-chevron-left text-sm"></i>
      </button>
    </div>

    <div class="p-4 shrink-0 w-72">
      <button onclick="newChat()" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-semibold py-3.5 rounded-2xl flex items-center justify-center gap-2 transition-all">
        <i class="fas fa-plus"></i> New Conversation
      </button>
    </div>

    <div class="px-4 flex-1 overflow-y-auto pb-4 w-72">
      <p class="text-amber-400/80 text-xs mb-3 px-3 font-semibold tracking-wider">QUICK PROMPTS</p>
      <div onclick="sendPrompt('Explain Karma from Gita')" class="prompt-btn text-sm text-zinc-300">Karma explained</div>
      <div onclick="sendPrompt('What is Dharma?')" class="prompt-btn text-sm text-zinc-300">Dharma meaning</div>
      <div onclick="sendPrompt('Verse on equanimity and inner balance')" class="prompt-btn text-sm text-zinc-300">Verse on balance</div>
      <div onclick="sendPrompt('How to handle fear and anxiety')" class="prompt-btn text-sm text-zinc-300">Handling anxiety</div>

      <div class="mt-8">
        <p class="text-amber-400/80 text-xs mb-3 px-3 font-semibold tracking-wider">SAVED ACTION SOLUTIONS</p>
        <div id="saved-prompts-list" class="space-y-2"></div>
      </div>
    </div>
  </div>

  <div class="flex-1 flex flex-col chat-container relative h-full min-w-0">
    
    <div class="oval-header mx-4 mt-4 px-6 py-4 flex items-center justify-between border border-zinc-800/60 shadow-xl z-10">
      <div class="flex items-center gap-4">
        <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center text-zinc-400 hover:text-amber-300 rounded-3xl hover:bg-zinc-800 transition-all">
          <i class="fas fa-bars text-lg"></i>
        </button>
        <div class="w-10 h-10 bg-gradient-to-br from-amber-400 to-orange-500 rounded-2xl flex items-center justify-center text-2xl font-bold text-zinc-950 shadow-md">ॐ</div>
        <div class="hidden md:block">
          <div class="text-xl font-bold tracking-tight text-zinc-100">Inner Peace &amp; Happiness</div>
          <div class="text-xs text-amber-200/60">Create calm, clear resolutions to difficult situations</div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="relative hidden sm:block">
          <input id="directSearch" type="text" placeholder="Find (e.g. 2.47)" 
                 class="bg-zinc-900 border border-zinc-700 text-zinc-200 px-4 py-2 rounded-full w-36 text-sm focus:outline-none focus:border-amber-500 transition-all"
                 onkeydown="handleDirectSearch(event)">
          <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 text-xs"></i>
        </div>

        <button id="langToggleBtn" onclick="toggleAudioLang()" title="Toggle EN/SA Audio" 
                class="w-8 h-8 flex items-center justify-center text-xs font-bold text-amber-500 border border-amber-500/30 rounded-lg hover:bg-amber-500/10 transition-all">
          EN
        </button>

        <button onclick="fetchRandomGitaVerse()" 
                class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 hover:text-amber-300 px-5 py-2.5 rounded-3xl text-sm font-medium transition-all ml-2">
          <i class="fas fa-book"></i>
          <span class="hidden sm:inline">Random</span>
        </button>
        <button onclick="openSettings()" class="w-10 h-10 flex items-center justify-center text-zinc-400 hover:text-amber-300 rounded-3xl hover:bg-zinc-800 transition-all">
          <i class="fas fa-cog text-xl"></i>
        </button>
      </div>
    </div>

    <div id="chat" class="flex-1 p-6 overflow-y-auto space-y-5 relative min-h-0">
      <div class="faint-overlay"></div>
    </div>

    <div class="p-5 border-t border-zinc-800/50 bg-zinc-950/80 z-10">
      <form onsubmit="sendMessage(event)" class="relative max-w-4xl mx-auto">
        <input id="userInput" type="text" autocomplete="off"
               class="w-full bg-zinc-900 border border-zinc-800 rounded-3xl px-7 py-4.5 pr-16 focus:outline-none focus:border-amber-500 text-base placeholder-zinc-500 text-zinc-100 shadow-inner transition-all"
               placeholder="Describe your situation or ask a question...">
        <button type="submit" 
                class="absolute right-3 top-1/2 -translate-y-1/2 bg-amber-500 hover:bg-amber-600 active:scale-95 text-black w-11 h-11 rounded-2xl flex items-center justify-center transition-all shadow-md">
          <i class="fas fa-paper-plane"></i>
        </button>
      </form>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    let audioLang = 'en';
    let currentAudio = null;

    const chapterBounds = { 1:47, 2:72, 3:43, 4:42, 5:29, 6:47, 7:30, 8:28, 9:34, 10:42, 11:55, 12:20, 13:35, 14:27, 15:20, 16:24, 17:28, 18:78 };

    const wisdomDb = {
      karma: [
        { title: "Wisdom on Action & Purpose", ch: 3, verse: 19, slok: "तस्मादसक्तः सततम् कार्यम् कर्म समाचर।\nअसक्तो ह्याचरन्कर्म परमाप्नोति पूरुषः॥", translation: "Therefore, without attachment, always perform the actions that ought to be done; for by performing actions without attachment, one attains the supreme state." },
        { title: "The Path of Action", ch: 2, verse: 47, slok: "कर्मण्येवाधिकारस्ते मा फलेषु कदाचन।\nमा कर्मफलहेतुर्भूर्मा ते सङ्गोऽस्त्वकर्मणि॥", translation: "You have a right to perform your prescribed duties, but you are never entitled to the fruits of your actions. Never consider yourself to be the cause of the results of your activities, nor be attached to inaction." },
        { title: "Pure and Balanced Labor", ch: 18, verse: 23, slok: "नियतं सङ्गरहितमरागद्वेषतः कृतम्।\nअफलप्रेप्सुना कर्म यत्तत्सात्त्विकमुच्यते॥", translation: "Action which is ordained, which is free from attachment, which is done without love or hatred by one not desirous of the fruit, that is declared to be pure." }
      ],
      dharma: [
        { title: "Wisdom on Natural Duty", ch: 18, verse: 47, slok: "श्रेयानस्वधर्मो विगुणः परधर्मात्स्वनुष्ठितात्।\nस्वभावनियतं कर्म कुर्वन्नाप्नोति किल्बिषम्॥", translation: "It is far better to perform one’s own natural duties, even if imperfectly, than to master the duties of another. Engaging in work mapped to your true nature brings no internal conflict." },
        { title: "Identity and Path", ch: 3, verse: 35, slok: "श्रेयानस्वधर्मो विगुणः परधर्मात्स्वनुष्ठितात्।\nस्वधर्मे निधनं श्रेयः परधर्मो भयावहः॥", translation: "It is far better to follow one's own path, even if flawed, than to perfectly copy another's blueprint. Even destruction on your own natural path brings alignment." }
      ],
      balance: [
        { title: "Wisdom on Equanimity", ch: 2, verse: 48, slok: "योगस्थः कुरु कर्माणि सङ्गं त्यक्त्वा धनञ्जय।\nसिद्ध्यसिद्ध्योः समो भूत्वा समत्वं योग उच्यते॥", translation: "Be steadfast in your path, abandoning all anxious attachment to success or failure. Such balance and evenness of mind is the true essence of Yoga." },
        { title: "The Peaceful Mind", ch: 2, verse: 70, slok: "आपूर्यमाणमचलप्रतिष्ठं समुद्रमापः प्रविशन्ति यद्वत्।\nतद्वत्कामा यं प्रविशन्ति सर्वे स शान्तिमाप्नोति न कामकामी॥", translation: "Just as the ocean remains undisturbed by the continuous flow of torrents entering it, a person who remains unmoved by the incoming rush of desires achieves deep peace." }
      ],
      anxiety: [
        { title: "Wisdom on Overcoming Anxiety", ch: 2, verse: 14, slok: "मात्रास्पर्शास्तु कौन्तेय शीतोष्णसुखदुःखदाः।\nआगमापायिनोऽनित्यास्तांस्तितिक्षस्व भारत॥", translation: "The sensory contacts with external things give rise to temporary feelings of pleasure and pain. They come and go like changing seasons. Observe and tolerate them without letting them shake your internal core." },
        { title: "Freedom from Fear", ch: 18, verse: 66, slok: "सर्वधर्मान्परित्यज्य मामेकं शरणं व्रज।\nअहं त्वां सर्वपापेभ्यो मोक्षयिष्यामि मा शुचः॥", translation: "Abandon all varieties of operational anxieties and surrender completely into the cosmic flow. Do not fear, do not grieve." }
      ],
      anger: [
        { title: "The Cascade of Anger", ch: 2, verse: 62, slok: "ध्यायतो विषयान्पुंसः सङ्गस्तेषूपजायते।\nसङ्गात्सञ्जायते कामः कामात्क्रोधोऽभिजायते॥", translation: "While contemplating the objects of the senses, a person develops attachment for them, and from such attachment lust develops, and from lust anger arises." },
        { title: "Breaking the Cycle", ch: 2, verse: 63, slok: "क्रोधाद्भवति सम्मोहः सम्मोहात्स्मृतिविभ्रमः।\nस्मृतिभ्रंशाद्बुद्धिनाशो बुद्धिनाशात्प्रणश्यति॥", translation: "From anger, complete delusion arises, and from delusion bewilderment of memory. When memory is bewildered, intelligence is lost, and when intelligence is lost one falls down again into the material pool." }
      ],
      grief: [
        { title: "Wisdom on Sorrow", ch: 2, verse: 11, slok: "अशोच्यानन्वशोचस्त्वं प्रज्ञावादांश्च भाषसे।\nगतासूनगतासूंश्च नानुशोचन्ति पण्डिताः॥", translation: "While speaking learned words, you are mourning for what is not worthy of grief. Those who are wise lament neither for the living nor for the dead." },
        { title: "The Eternal Nature", ch: 2, verse: 22, slok: "वासांसि जीर्णानि यथा विहाय नवानि गृह्णाति नरोऽपराणि।\nतथा शरीराणि विहाय जीर्णान्यन्यानि संयाति नवानि देही॥", translation: "As a person puts on new garments, giving up old ones, the soul similarly accepts new material bodies, giving up the old and useless ones." }
      ],
      doubt: [
        { title: "Slaying Doubt", ch: 4, verse: 42, slok: "तस्मादज्ञानसम्भूतं हृत्स्थं ज्ञानासिनात्मनः।\nछित्त्वैनं संशयं योगमातिष्ठोत्तिष्ठ भारत॥", translation: "Therefore, the doubts which have arisen in your heart out of ignorance should be slashed by the weapon of knowledge. Armed with yoga, stand and fight." },
        { title: "Clarity Restored", ch: 18, verse: 73, slok: "नष्टो मोहः स्मृतिर्लब्धा त्वत्प्रसादान्मयाच्युत।\nस्थितोऽस्मि गतसन्देहः करिष्ये वचनं तव॥", translation: "My illusion is now gone. I have regained my memory by Your mercy. I am now firm and free from doubt and am prepared to act according to Your instructions." }
      ],
      relationships: [
        { title: "Transcending Envy", ch: 12, verse: 13, slok: "अद्वेष्टा सर्वभूतानां मैत्रः करुण एव च।\nनिर्ममो निरहङ्कारः समदुःखसुखः क्षमी॥", translation: "One who is not envious but is a kind friend to all living entities, who does not think himself a proprietor and is free from false ego, who is equal in both happiness and distress, and tolerant, is very dear to Me." },
        { title: "Dealing with Difficult Traits", ch: 16, verse: 4, slok: "दम्भो दर्पोऽभिमानश्च क्रोधः पारुष्यमेव च।\nअज्ञानं चाभिजातस्य पार्थ सम्पदमासुरीम्॥", translation: "Pride, arrogance, conceit, anger, harshness and ignorance—these qualities belong to those of demoniac nature. Recognize these traits without letting them disturb your own balance." }
      ]
    };

    const randomVersePool = [
      { ch: 6, verse: 5, slok: "उद्धरेदात्मनात्मानं नात्मानमवसादयेत्।\nआत्मैव ह्यात्मनो बन्धुरात्मैव रिपुरात्मनः॥", translation: "Let a man lift himself up by his own mind; let him not degrade himself. For the mind is the friend of the self, and the mind can be the enemy of the self." },
      // ... (other verses from your original code)
      { ch: 2, verse: 47, slok: "कर्मण्येवाधिकारस्ते मा फलेषु कदाचन।\nमा कर्मफलहेतुर्भूर्मा ते सङ्गोऽस्त्वकर्मणि॥", translation: "You have a right to perform your prescribed duties, but you are never entitled to the fruits of your actions." }
    ];

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (sidebar.classList.contains('w-72')) {
        sidebar.className = "w-0 border-transparent opacity-0 flex flex-col h-full z-20 sidebar-transition overflow-hidden shrink-0";
      } else {
        sidebar.className = "w-72 bg-zinc-950/95 border-r border-zinc-800 flex flex-col h-full z-20 sidebar-transition overflow-hidden shrink-0";
      }
    }

    let savedPrompts = JSON.parse(localStorage.getItem('gitaSavedPrompts')) || [];

    function renderSavedPrompts() {
      const container = document.getElementById('saved-prompts-list');
      if (savedPrompts.length === 0) {
        container.innerHTML = '<div class="text-zinc-600 text-xs px-3 italic">No configurations saved yet.</div>';
        return;
      }
      container.innerHTML = savedPrompts.map((p, index) => `
        <div class="prompt-btn text-sm flex justify-between items-center relative overflow-hidden group" title="${p.prompt || p.title}">
          <div class="truncate flex-1 pr-2 py-0.5 text-zinc-300 hover:text-amber-300" onclick="loadSavedVerse(${index})">
            ${p.name}
          </div>
          <button onclick="event.stopPropagation(); deleteSavedPrompt(${index})" class="text-zinc-500 hover:text-red-400 transition-colors px-1 z-10">
            <i class="fas fa-trash-alt text-xs"></i>
          </button>
        </div>
      `).join('');
    }

    function loadSavedVerse(index) {
      const item = savedPrompts[index];
      if (!item) return;
      if (item.prompt && item.prompt !== "Random Selection" && item.prompt !== "Direct Search") {
        appendMessage('user', item.prompt);
      } else {
        appendMessage('user', `Reviewed Saved Entry: "${item.name}"`);
      }
      const html = buildVerseHTML(item.title, item.ch, item.verse, item.slok, item.translation, null);
      appendMessage('bot', html);
    }

    function bookmarkExactVerse(promptText, title, ch, verse, slok, translation) {
      let name = prompt("Give this resolution entry a unique name:");
      if (!name || name.trim() === "") return;
      name = name.trim();
      if (savedPrompts.some(p => p.name.toLowerCase() === name.toLowerCase())) {
        alert("A configuration with this name already exists.");
        return;
      }
      savedPrompts.push({ name, prompt: promptText, title, ch, verse, slok: slok ? slok.replace(/\\n/g, '\n') : '', translation });
      localStorage.setItem('gitaSavedPrompts', JSON.stringify(savedPrompts));
      renderSavedPrompts();
    }

    function deleteSavedPrompt(index) {
      if (confirm("Remove this entry?")) {
        savedPrompts.splice(index, 1);
        localStorage.setItem('gitaSavedPrompts', JSON.stringify(savedPrompts));
        renderSavedPrompts();
      }
    }

    function setupDynamicBackground() {
      const backgroundImages = [
        'https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&w=1400&q=60',
        'https://images.unsplash.com/photo-1518241353330-0f7941c2d9b5?auto=format&fit=crop&w=1400&q=60',
        'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1400&q=60'
      ];
      const selectedImg = backgroundImages[Math.floor(Math.random() * backgroundImages.length)];
      document.body.style.backgroundImage = `linear-gradient(rgba(9, 9, 11, 0.90), rgba(9, 9, 11, 0.95)), url('${selectedImg}')`;
    }

    function appendMessage(sender, html) {
      const div = document.createElement('div');
      div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full`;
      div.innerHTML = `
        <div class="max-w-[82%] ${sender === 'user' ? 'message-user' : 'message-bot'} px-6 py-4 text-[15.5px] leading-relaxed shadow-md">
          <div>${html}</div>
        </div>
      `;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function matchIntentData(text) {
      const lower = text.toLowerCase();
      if (/karma|action|deeds|work|career|job/i.test(lower)) return wisdomDb.karma[Math.floor(Math.random() * wisdomDb.karma.length)];
      if (/dharma|duty|purpose/i.test(lower)) return wisdomDb.dharma[Math.floor(Math.random() * wisdomDb.dharma.length)];
      if (/equanimity|balance|peace|calm/i.test(lower)) return wisdomDb.balance[Math.floor(Math.random() * wisdomDb.balance.length)];
      if (/fear|anxious|worry|stress/i.test(lower)) return wisdomDb.anxiety[Math.floor(Math.random() * wisdomDb.anxiety.length)];
      if (/anger|frustration/i.test(lower)) return wisdomDb.anger[Math.floor(Math.random() * wisdomDb.anger.length)];
      if (/grief|sad|loss/i.test(lower)) return wisdomDb.grief[Math.floor(Math.random() * wisdomDb.grief.length)];
      if (/doubt|confusion/i.test(lower)) return wisdomDb.doubt[Math.floor(Math.random() * wisdomDb.doubt.length)];
      if (/jealous|envy|relationship/i.test(lower)) return wisdomDb.relationships[Math.floor(Math.random() * wisdomDb.relationships.length)];

      return randomVersePool[Math.floor(Math.random() * randomVersePool.length)];
    }

    function toggleAudioLang() {
      audioLang = audioLang === 'en' ? 'sa' : 'en';
      document.getElementById('langToggleBtn').innerText = audioLang.toUpperCase();
    }

    function toggleVerseAudio(btn, enText, saText) {
      const icon = btn.querySelector('i');
      if (currentAudio) {
        window.speechSynthesis.cancel();
        icon.classList.remove('fa-volume-up', 'text-amber-500');
        icon.classList.add('fa-volume-mute');
        currentAudio = null;
        return;
      }

      window.speechSynthesis.cancel();
      const textToPlay = audioLang === 'en' ? enText : (saText || enText);
      const msg = new SpeechSynthesisUtterance(textToPlay);
      msg.rate = 0.85;
      msg.lang = audioLang === 'en' ? 'en-US' : 'hi-IN';

      icon.classList.remove('fa-volume-mute');
      icon.classList.add('fa-volume-up', 'text-amber-500');

      msg.onend = () => {
        icon.classList.remove('fa-volume-up', 'text-amber-500');
        icon.classList.add('fa-volume-mute');
        currentAudio = null;
      };

      window.speechSynthesis.speak(msg);
      currentAudio = msg;
    }

    function buildVerseHTML(title, chapter, verse, slok, translation, associatedPrompt = null) {
      const formattedSlok = slok ? `<span class="sanskrit-verse">${slok.replace(/\n/g, '<br>')}</span>` : '';
      const safeTitle = title.replace(/'/g, "\\'").replace(/"/g, "&quot;");
      const safeSlok = slok ? slok.replace(/'/g, "\\'").replace(/\n/g, "\\n") : '';
      const safeTrans = translation.replace(/'/g, "\\'").replace(/"/g, "&quot;");
      const safePrompt = associatedPrompt ? associatedPrompt.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';

      const bookmarkBtn = associatedPrompt ? `
        <button onclick="bookmarkExactVerse('${safePrompt}', '${safeTitle}', ${chapter}, ${verse}, '${safeSlok}', '${safeTrans}')" 
                class="text-[11px] text-amber-300/80 hover:text-amber-300 flex items-center gap-1 bg-zinc-800/80 hover:bg-zinc-700/80 px-2.5 py-1 rounded-md transition-all border border-zinc-700/40">
          <i class="fas fa-bookmark text-[10px]"></i> Save Action
        </button>` : '';

      const toolsHTML = `
        <div class="mt-3 pt-2 border-t border-zinc-800/60 flex justify-between items-center">
          <div class="flex gap-2">
            <button onclick="toggleVerseAudio(this, '${safeTrans}', '${safeSlok}')" class="text-zinc-400 hover:text-amber-400 transition-colors p-1" title="Toggle Audio">
              <i class="fas fa-volume-mute"></i>
            </button>
          </div>
          ${bookmarkBtn}
        </div>`;

      return `
        <strong class="text-amber-400 block mb-2">${title} (Chapter ${chapter}, Verse ${verse})</strong>
        ${formattedSlok}
        <div class="text-zinc-300 italic border-l-2 border-amber-500/40 pl-3 mt-3 leading-relaxed">"${translation}"</div>
        ${toolsHTML}
      `;
    }

    async function getVerseData(ch, verse) {
      const cacheKey = `gita_cache_${ch}_${verse}`;
      const cached = localStorage.getItem(cacheKey);
      if (cached) return JSON.parse(cached);
      
      try {
        const res = await fetch(`https://bhagavadgitaapi.in/slok/${ch}/${verse}/`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        localStorage.setItem(cacheKey, JSON.stringify(data));
        return data;
      } catch (e) {
        throw e;
      }
    }

    async function sendMessage(e, explicitText = null) {
      if (e && e.preventDefault) e.preventDefault();
      const input = document.getElementById('userInput');
      const msg = explicitText ? explicitText.trim() : input.value.trim();
      if (!msg) return;

      appendMessage('user', msg);
      if (!explicitText) input.value = '';

      const thinking = appendMessage('bot', '<span class="text-amber-400 font-medium animate-pulse">Contemplating the verses...</span>');
      const matched = matchIntentData(msg);

      try {
        const data = await getVerseData(matched.ch, matched.verse);
        thinking.parentElement.remove();
        const extractedTranslation = data.siva?.et || data.purohit?.et || data.tej?.ht || matched.translation;
        const extractedSlok = data.slok || matched.slok || "";
        appendMessage('bot', buildVerseHTML(matched.title, matched.ch, matched.verse, extractedSlok, extractedTranslation, msg));
      } catch (err) {
        thinking.parentElement.remove();
        appendMessage('bot', buildVerseHTML(matched.title, matched.ch, matched.verse, matched.slok, matched.translation, msg));
      }
    }

    function sendPrompt(promptText) {
      setTimeout(() => sendMessage(null, promptText), 80);
    }

    async function handleDirectSearch(e) {
      if (e.key === 'Enter') {
        const val = e.target.value.trim();
        const parts = val.split('.');
        if (parts.length === 2) {
          const ch = parseInt(parts[0]);
          const v = parseInt(parts[1]);
          if (!isNaN(ch) && !isNaN(v) && ch >= 1 && ch <= 18 && v >= 1 && v <= (chapterBounds[ch] || 50)) {
            e.target.value = '';
            appendMessage('user', `Look up exact verse: ${ch}.${v}`);
            const thinking = appendMessage('bot', '<span class="text-amber-400 font-medium animate-pulse">Retrieving specific text...</span>');
            
            try {
              const data = await getVerseData(ch, v);
              thinking.parentElement.remove();
              const extractedTranslation = data.siva?.et || data.purohit?.et || data.tej?.ht || "Translation unavailable.";
              appendMessage('bot', buildVerseHTML("Direct Lookup", ch, v, data.slok, extractedTranslation, "Direct Search"));
            } catch (err) {
              thinking.parentElement.remove();
              const fallback = randomVersePool[Math.floor(Math.random() * randomVersePool.length)];
              appendMessage('bot', buildVerseHTML("Direct Lookup (Local)", fallback.ch, fallback.verse, fallback.slok, fallback.translation, "Direct Search"));
            }
          } else {
            alert("Invalid verse. Please enter a valid Chapter.Verse (e.g., 2.47).");
          }
        } else {
          alert("Please format exactly as Chapter.Verse (e.g., 2.47)");
        }
      }
    }

    async function fetchRandomGitaVerse() {
      const randomChapter = Math.floor(Math.random() * 18) + 1;
      const randomVerse = Math.floor(Math.random() * (chapterBounds[randomChapter] || 30)) + 1;
      const loadingMsg = appendMessage('bot', '<span class="text-amber-400 font-medium animate-pulse">Opening a random chapter...</span>');

      try {
        const data = await getVerseData(randomChapter, randomVerse);
        loadingMsg.parentElement.remove();
        const extractedTranslation = data.siva?.et || data.purohit?.et || data.tej?.ht || "Wisdom is unfolding.";
        appendMessage('bot', buildVerseHTML("Random Insight", randomChapter, randomVerse, data.slok, extractedTranslation, "Random Selection"));
      } catch (e) {
        loadingMsg.parentElement.remove();
        const fallback = randomVersePool[Math.floor(Math.random() * randomVersePool.length)];
        appendMessage('bot', buildVerseHTML("Random Insight (Local)", fallback.ch, fallback.verse, fallback.slok, fallback.translation, "Random Selection"));
      }
    }
