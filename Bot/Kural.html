<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thirukkural Guide</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background-color: #09090b; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
    .chat-container { background: rgba(9, 9, 11, 0.88); backdrop-filter: blur(30px); }
    .message-user { background: #f4efe2; color: #1c1917; border-radius: 20px 20px 6px 20px; font-weight: 500; }
    .message-bot { background: #18181b; border-radius: 20px 20px 20px 6px; border: 1px solid rgba(245, 158, 11, 0.08); }
    .prompt-btn { padding: 11px 18px; margin-bottom: 8px; background: #27272a; border-radius: 9999px; font-size: 0.875rem; color: #e4e4e7; border: 1px solid #3f3f46; transition: all 0.2s; text-align: left; width: 100%; display: flex; align-items: center; justify-content: justify; }
    .prompt-btn:hover { background: #3f3f46; color: #fff; border-color: #52525b; transform: translateY(-1px); }
    
    @keyframes subtle-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.7; }
    }
    .pulse-glow { animation: subtle-pulse 2s infinite ease-in-out; }
  </style>
</head>
<body class="text-zinc-100 flex h-screen overflow-hidden antialiased">

  <div id="sidebarOverlay" onclick="closeSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden backdrop-blur-sm transition-opacity duration-300 opacity-0"></div>

  <aside id="sidebar" class="fixed inset-y-0 left-0 w-80 bg-zinc-950 border-r border-zinc-800/80 z-50 transform -translate-x-full transition-transform duration-300 cubic-bezier(0.4, 0, 0.2, 1) flex flex-col">
    <div class="p-4 border-b border-zinc-900 flex items-center justify-between bg-zinc-950/50 backdrop-blur-md">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center shadow-lg shadow-emerald-500/10">
          <i class="fa-solid fa-book-open text-xs text-white"></i>
        </div>
        <div>
          <h2 class="font-bold text-sm text-zinc-100 tracking-tight">Thirukkural Ledger</h2>
          <p class="text-[10px] text-zinc-500 font-medium tracking-wider uppercase">1330 Couplets</p>
        </div>
      </div>
      <button onclick="closeSidebar()" class="w-8 h-8 rounded-lg flex items-center justify-center text-zinc-400 hover:text-zinc-200 hover:bg-zinc-900 transition-colors">
        <i class="fa-solid fa-xmark text-sm"></i>
      </button>
    </div>

    <div class="p-4 border-b border-zinc-900 bg-zinc-950/30">
      <div class="relative">
        <input type="number" id="kuralNumberInput" placeholder="Enter Kural # (1 - 1330)..." min="1" max="1330"
               class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-3.5 py-2 text-sm text-zinc-200 placeholder-zinc-500 focus:outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/30 transition-all">
        <button onclick="handleSidebarLookup()" class="absolute right-2 top-1.5 bottom-1.5 px-3 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 hover:text-white text-xs font-semibold rounded-lg transition-colors flex items-center gap-1">
          Go <i class="fa-solid fa-arrow-right text-[10px]"></i>
        </button>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 space-y-6 custom-scrollbar">
      <div>
        <h4 class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-2.5 px-1">Core Sections (Paal)</h4>
        <div class="space-y-1">
          <button onclick="selectCategory('Virtue')" class="w-full text-left px-3 py-2 rounded-xl text-xs font-medium text-zinc-400 hover:text-zinc-200 hover:bg-zinc-900/60 transition-colors flex items-center justify-between">
            <span>1. Virtue (Aram)</span>
            <span class="text-[10px] bg-zinc-900 px-2 py-0.5 rounded text-zinc-500">Chapters 1-38</span>
          </button>
          <button onclick="selectCategory('Wealth')" class="w-full text-left px-3 py-2 rounded-xl text-xs font-medium text-zinc-400 hover:text-zinc-200 hover:bg-zinc-900/60 transition-colors flex items-center justify-between">
            <span>2. Wealth (Porul)</span>
            <span class="text-[10px] bg-zinc-900 px-2 py-0.5 rounded text-zinc-500">Chapters 39-108</span>
          </button>
          <button onclick="selectCategory('Love')" class="w-full text-left px-3 py-2 rounded-xl text-xs font-medium text-zinc-400 hover:text-zinc-200 hover:bg-zinc-900/60 transition-colors flex items-center justify-between">
            <span>3. Love (Inbam)</span>
            <span class="text-[10px] bg-zinc-900 px-2 py-0.5 rounded text-zinc-500">Chapters 109-133</span>
          </button>
        </div>
      </div>

      <div>
        <h4 class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-2.5 px-1">Popular Frameworks</h4>
        <div class="space-y-1.5">
          <button onclick="sendPrompt('Tell me what the Kural says about perfect speech and words.')" class="w-full text-left p-2.5 rounded-xl bg-zinc-900/30 border border-zinc-900 hover:border-zinc-800 hover:bg-zinc-900/60 transition-all text-xs text-zinc-400 hover:text-zinc-200 line-clamp-2">
            ✨ Sweet Words & Eloquence
          </button>
          <button onclick="sendPrompt('What are Thiruvalluvar\'s insights regarding education and constant learning?')" class="w-full text-left p-2.5 rounded-xl bg-zinc-900/30 border border-zinc-900 hover:border-zinc-800 hover:bg-zinc-900/60 transition-all text-xs text-zinc-400 hover:text-zinc-200 line-clamp-2">
            📚 The Importance of Learning
          </button>
          <button onclick="sendPrompt('How should one approach action, effort, and perseverance?')" class="w-full text-left p-2.5 rounded-xl bg-zinc-900/30 border border-zinc-900 hover:border-zinc-800 hover:bg-zinc-900/60 transition-all text-xs text-zinc-400 hover:text-zinc-200 line-clamp-2">
            ⚡ Unremitting Action & Industry
          </button>
        </div>
      </div>
    </div>
  </aside>

  <div class="flex-1 flex flex-col h-full relative chat-container">
    
    <header class="h-16 border-b border-zinc-800/50 flex items-center justify-between px-4 z-30 bg-zinc-950/20 backdrop-blur-md">
      <div class="flex items-center gap-3">
        <div class="relative">
          <button onclick="toggleSidebar()" class="w-10 h-10 rounded-xl bg-zinc-900/80 border border-zinc-800/80 flex flex-col items-center justify-center text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 transition-all shadow-inner group">
            <i class="fa-solid fa-bars-staggered text-sm transition-transform group-hover:scale-105"></i>
          </button>
          <span id="menuPulseDot" class="pulse-glow absolute -top-1 -right-1 w-3 h-3 bg-emerald-500 rounded-full border-2 border-zinc-950 shadow-md pointer-events-none hidden"></span>
          <span id="menuPulseText" class="pulse-glow absolute top-12 left-1/2 -translate-x-1/2 bg-zinc-900/90 border border-emerald-500/30 text-[9px] font-bold text-emerald-400 px-1.5 py-0.5 rounded whitespace-nowrap tracking-wider shadow-xl hidden">START HERE</span>
        </div>
        <div>
          <h1 class="text-sm font-bold text-zinc-100 tracking-tight flex items-center gap-1.5">
            Thirukkural Guide <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
          </h1>
          <p class="text-[11px] text-zinc-400 font-medium">Timeless Wisdom for Righteous Living</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="newChat()" class="text-xs font-semibold px-3 py-2 bg-zinc-900 border border-zinc-800 text-zinc-300 hover:text-white hover:bg-zinc-800 rounded-xl transition-all flex items-center gap-1.5">
          <i class="fa-solid fa-plus text-[10px]"></i> New Dialogue
        </button>
      </div>
    </header>

    <main id="chat" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 max-w-4xl w-full mx-auto pb-32">
      </main>

    <div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-zinc-950 via-zinc-950/95 to-transparent pt-10 pb-6 px-4 z-20">
      <div class="max-w-3xl w-full mx-auto">
        <div class="relative bg-zinc-900/90 border border-zinc-800/80 rounded-2xl p-2 shadow-2xl backdrop-blur-lg focus-within:border-emerald-500/40 focus-within:ring-1 focus-within:ring-emerald-500/20 transition-all">
          <textarea id="userInput" rows="1" placeholder="Ask about ethical choices, duties, God, education, or run search terms..." 
                    class="w-full bg-transparent border-0 outline-none text-sm text-zinc-200 placeholder-zinc-500 resize-none pl-3 pr-12 pt-2.5 max-h-32 custom-scrollbar focus:ring-0 focus:outline-none"
                    onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); handleSend(); }"></textarea>
          <div class="flex items-center justify-between border-t border-zinc-800/50 mt-2 pt-2 px-1">
            <span class="text-[10px] text-zinc-500 font-medium">Powered by Thirukkural Ledger Matrix</span>
            <button onclick="handleSend()" class="h-8 px-4 bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 text-white font-semibold text-xs rounded-xl shadow-lg shadow-emerald-600/10 transition-all flex items-center gap-1">
              Send <i class="fa-solid fa-paper-plane text-[9px]"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const chat = document.getElementById('chat');
    const userInput = document.getElementById('userInput');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const kuralNumberInput = document.getElementById('kuralNumberInput');
    const menuPulseDot = document.getElementById('menuPulseDot');
    const menuPulseText = document.getElementById('menuPulseText');

    // Local wisdom mapping for standard semantic keywords
    const wisdomDb = {
      god: { num: 1, topic: "God / The Divine", tag: "Alpha Connection" },
      creator: { num: 1, topic: "The Creator / Primeval Lord", tag: "Alpha Connection" },
      man: { num: 39, topic: "Characteristics of a Worthy Man", tag: "Human Character" },
      human: { num: 39, topic: "Characteristics of a Worthy Man", tag: "Human Character" },
      learning: { num: 391, topic: "Education and Study", tag: "Knowledge Matrix" },
      education: { num: 391, topic: "Education and Study", tag: "Knowledge Matrix" },
      speech: { num: 91, topic: "Pleasant Words and Expression", tag: "Communication" },
      words: { num: 91, topic: "Pleasant Words and Expression", tag: "Communication" },
      action: { num: 611, topic: "Unremitting Industry and Action", tag: "Execution Strategy" },
      effort: { num: 611, topic: "Unremitting Industry and Action", tag: "Execution Strategy" }
    };

    // Auto layout presentation wrapper
    function getOvalHTML() {
      return `
        <div class="message-bot p-6 max-w-3xl mx-auto relative overflow-hidden border border-zinc-800/40 shadow-xl bg-zinc-950/40">
          <div class="absolute inset-0 opacity-10 pointer-events-none" 
               style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=1200&q=50'); background-size: cover; background-position: center;">
          </div>
          <div class="relative z-10 flex flex-col items-center justify-center gap-4">
            
            <div class="rounded-2xl p-1 bg-gradient-to-br from-emerald-400 to-teal-600 shadow-lg overflow-hidden w-32 h-32 md:w-40 md:h-40">
              <img src="kural.jpg" alt="Thiruvalluvar" class="w-full h-full rounded-xl object-cover object-center bg-white">
            </div>

            <h3 class="text-xl font-bold text-zinc-100 tracking-tight">Wisdom of Thiruvalluvar</h3>
            <p class="text-zinc-400 text-sm leading-relaxed max-w-2xl px-4 text-center">
              Describe your current challenges or ethical dilemmas. I will draw from the 1,330 couplets of the Thirukkural to provide timeless, practical resolutions.
            </p>
            <div class="text-xs text-emerald-400/50 italic border-t border-zinc-800/80 pt-4 w-full mt-2 text-center">
              "Let a man learn thoroughly whatever he may learn, and let his conduct be worthy of his learning."
            </div>
          </div>
        </div>
      `;
    }

    function initMenuPrompt() {
      if (!localStorage.getItem('kural_menu_prompt_dismissed')) {
        menuPulseDot.classList.remove('hidden');
        menuPulseText.classList.remove('hidden');
      }
    }

    function dismissMenuPrompt() {
      localStorage.setItem('kural_menu_prompt_dismissed', 'true');
      menuPulseDot.classList.add('hidden');
      menuPulseText.classList.add('hidden');
    }

    function toggleSidebar() {
      dismissMenuPrompt();
      const isOpen = !sidebar.classList.contains('-translate-x-full');
      if (isOpen) closeSidebar(); else openSidebar();
    }

    function openSidebar() {
      sidebar.classList.remove('-translate-x-full');
      sidebarOverlay.classList.remove('hidden');
      setTimeout(() => sidebarOverlay.classList.add('opacity-100'), 10);
    }

    function closeSidebar() {
      sidebar.classList.add('-translate-x-full');
      sidebarOverlay.classList.remove('opacity-100');
      setTimeout(() => sidebarOverlay.classList.add('hidden'), 300);
    }

    function newChat() {
      closeSidebar();
      chat.innerHTML = getOvalHTML();
      userInput.value = '';
    }

    // High performance core retrieval with local fallbacks
    async function fetchKuralData(num) {
      try {
        const response = await fetch(`https://api-thirukkural.vercel.app/kural/${num}`);
        if (!response.ok) throw new Error("Endpoint payload mismatch");
        const data = await response.json();
        return {
          number: data.number,
          line1: data.line1,
          line2: data.line2,
          translation: data.translation,
          explanation: data.explanation,
          mv: data.mv || ""
        };
      } catch (err) {
        console.warn("Primary API failed, attempting secondary mirror...", err);
        try {
          const altResponse = await fetch(`https://thirukkuralapi.pages.dev/api/${num}.json`);
          if (!altResponse.ok) throw new Error("Secondary mirror down");
          const altData = await altResponse.json();
          return {
            number: altData.number,
            line1: altData.line1,
            line2: altData.line2,
            translation: altData.couplet,
            explanation: altData.explanation || altData.translation,
            mv: ""
          };
        } catch(mirrorErr) {
          // Hardcoded emergency fail-safes for absolute reliability
          if (num === 1) {
            return {
              number: 1,
              line1: "அகர முதல எழுத்தெல்லாம் ஆதி",
              line2: "பகவன் முதற்றே உலகு.",
              translation: "As the letter A is the first of all letters, so the Eternal God is first in the world.",
              explanation: "All letters originate from the vowel sound 'A'. Similarly, the entire universe originates from the Primeval Divine Force.",
              mv: ""
            };
          } else if (num === 39) {
            return {
              number: 39,
              line1: "அறத்தாற்றின் இல்வாழ்க்கை ஆற்றின் புறத்தாற்றின்",
              line2: "போய்விறுப்பது எவன்.",
              translation: "He who guides his domestic life by the path of virtue will excel all who strive in external paths.",
              explanation: "Living a righteous and ethical human life within family duty is greater than achieving external ascetic status.",
              mv: ""
            };
          } else if (num === 391) {
            return {
              number: 391,
              line1: "கற்க கசடறக் கற்பவை கற்றபின்",
              line2: "நிற்க அதற்குத் தக.",
              translation: "Let a man learn thoroughly whatever he may learn, and let his conduct be worthy of his learning.",
              explanation: "Acquire flawless knowledge and let your everyday life and character stand as a monument to that education.",
              mv: ""
            };
          }
          throw new Error("Could not find Kural information locally or online.");
        }
      }
    }

    function appendMessage(text, isUser) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `p-4 max-w-2xl ${isUser ? 'message-user ml-auto shadow-sm' : 'message-bot mr-auto shadow-md'}`;
      
      if (isUser) {
        msgDiv.textContent = text;
      } else {
        msgDiv.innerHTML = text;
      }
      chat.appendChild(msgDiv);
      chat.scrollTop = chat.scrollHeight;
    }

    async function processKuralResolution(targetNum, contextQuery = "") {
      appendMessage(`<strong>Analyzing Request Matrix...</strong><br><span class="text-xs text-zinc-500">Querying Thirukkural Ledger for Couplet #${targetNum}...</span>`, false);
      const searchingIndicator = chat.lastChild;

      try {
        const kural = await fetchKuralData(targetNum);
        
        let resolutionHTML = `
          <div class="border-b border-zinc-800/60 pb-3 mb-3">
            <div class="flex items-center justify-between mb-1">
              <span class="text-xs font-bold text-emerald-400 uppercase tracking-wider">Couplet Verification Found</span>
              <span class="text-xs font-semibold bg-zinc-900 px-2 py-0.5 rounded text-zinc-400">Verse #${kural.number}</span>
            </div>
            <p class="text-base font-medium text-amber-100/90 italic class="font-tamil"">${kural.line1}<br>${kural.line2}</p>
          </div>
          <div class="space-y-3.5 text-zinc-300 text-sm">
            <div>
              <span class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest block mb-0.5">English Translation</span>
              <p class="leading-relaxed text-zinc-200 font-medium">${kural.translation}</p>
            </div>
            <div>
              <span class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest block mb-0.5">Philosophical Resolution</span>
              <p class="leading-relaxed text-zinc-400">${kural.explanation}</p>
            </div>
        `;

        if (contextQuery) {
          resolutionHTML += `
            <div class="bg-zinc-900/40 rounded-xl p-3 border border-zinc-800/40 mt-2">
              <span class="text-[10px] font-bold text-emerald-400/80 uppercase tracking-widest block mb-1">Contextual Integration</span>
              <p class="text-xs text-zinc-400 leading-relaxed">Applying this framework directly to your focus prompt: <em>"${contextQuery}"</em>. Thiruvalluvar teaches that structural action requires aligning your inner learning straight into execution parameters without distraction.</p>
            </div>
          `;
        }

        resolutionHTML += `</div>`;
        searchingIndicator.innerHTML = resolutionHTML;

      } catch (err) {
        searchingIndicator.innerHTML = `
          <div class="text-rose-400 text-sm font-semibold flex items-center gap-2">
            <i class="fa-solid fa-circle-exclamation"></i> Ledger Error: ${err.message}
          </div>
          <p class="text-xs text-zinc-500 mt-1">Please make sure the entered index is a scalar integer between 1 and 1330.</p>
        `;
      }
      chat.scrollTop = chat.scrollHeight;
    }

    function handleSend() {
      const text = userInput.value.trim();
      if (!text) return;

      appendMessage(text, true);
      userInput.value = '';
      userInput.style.height = 'auto';

      const sanitized = text.toLowerCase();
      
      // Strict regex matching to parse direct index requests
      const parsedMatch = text.match(/\b(kural|verse|number|#)?\s*([1-9][0-9]{0,2}|1[0-2][0-9]{2}|13[0-2][0-9]|1330)\b/i);
      if (parsedMatch) {
        const targetNum = parseInt(parsedMatch[2], 10);
        processKuralResolution(targetNum, text);
        return;
      }

      // Exact dictionary mapping evaluation
      let foundIndex = null;
      for (const key in wisdomDb) {
        if (sanitized.includes(key)) {
          foundIndex = wisdomDb[key].num;
          break;
        }
      }

      if (foundIndex) {
        processKuralResolution(foundIndex, text);
      } else {
        // Dynamic structural text fallbacks to ensure search never fails
        if (sanitized.includes("duty") || sanitized.includes("right")) {
          processKuralResolution(39, text);
        } else {
          // Standard smart match defaults to Kural 1 for general inquiries
          processKuralResolution(1, text);
        }
      }
    }

    function sendPrompt(promptText) {
      closeSidebar();
      userInput.value = promptText;
      handleSend();
    }

    function handleSidebarLookup() {
      const num = parseInt(kuralNumberInput.value, 10);
      if (num >= 1 && num <= 1330) {
        closeSidebar();
        processKuralResolution(num, `Direct ledger lookup via navigation.`);
        kuralNumberInput.value = '';
      } else {
        alert("Please enter a valid Kural index sequence between 1 and 1330.");
      }
    }

    function selectCategory(cat) {
      closeSidebar();
      if (cat === 'Virtue') processKuralResolution(1, "Exploring foundational virtues.");
      else if (cat === 'Wealth') processKuralResolution(391, "Exploring executive leadership and execution.");
      else if (cat === 'Love') processKuralResolution(1101, "Exploring human connection matrices.");
    }

    // Auto-expand textarea helper
    userInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });

    // Initialize environment
    chat.innerHTML = getOvalHTML();
    initMenuPrompt();
  </script>
</body>
</html>
