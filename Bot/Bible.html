<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holy Bible Guide</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background-color: #09090b;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .chat-container {
      background: rgba(9, 9, 11, 0.88);
      backdrop-filter: blur(30px);
    }
    .message-user {
      background: #f4efe2;
      color: #1c1917;
      border-radius: 20px 20px 6px 20px;
      font-weight: 500;
    }
    .message-bot {
      background: #18181b;
      border-radius: 20px 20px 20px 6px;
      border: 1px solid rgba(147, 51, 234, 0.15);
    }
    .prompt-btn {
      padding: 11px 18px;
      margin-bottom: 8px;
      background: #27272a;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .prompt-btn:hover {
      background: #3f3f46;
      transform: translateX(4px);
    }
    .faint-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 25%, rgba(147, 51, 234, 0.08), transparent 75%);
      pointer-events: none;
      z-index: 0;
    }
    .oval-header {
      border-radius: 9999px;
      background: rgba(24, 24, 27, 0.95);
    }
    #chat {
      scrollbar-width: thin;
      scrollbar-color: #6b21a8 #09090b;
    }
    .bible-verse {
      display: block;
      color: #c026d3;
      font-weight: 600;
      margin-top: 6px;
      margin-bottom: 6px;
      line-height: 1.6;
      font-size: 1.05em;
    }
    .sidebar-transition {
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease, border-color 0.3s ease;
    }
  </style>
</head>
<body class="h-screen w-screen text-gray-100 flex overflow-hidden bg-cover bg-center bg-no-repeat bg-fixed relative">

  <div id="settingsModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">

      <div class="p-5 border-b border-zinc-800 flex justify-between items-center bg-zinc-950/50">
        <h2 class="text-lg font-bold text-zinc-100"><i class="fas fa-cog text-purple-500 mr-2"></i> Settings</h2>
        <button onclick="closeSettings()" class="text-zinc-500 hover:text-red-400 transition-colors p-1">
          <i class="fas fa-times text-lg"></i>
        </button>
      </div>
      
      <div class="p-6 space-y-6">
        <div>
          <h3 class="text-purple-400 text-xs font-semibold tracking-wider mb-3 uppercase">Voice & Audio</h3>
          <div class="space-y-4">
            <div>
              <label class="block text-sm text-zinc-400 mb-1">English Voice</label>
              <select id="enVoiceSelect" onchange="saveSettings()" class="w-full bg-zinc-950 border border-zinc-700 text-zinc-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-purple-500"></select>
            </div>

            <div>
              <label class="block text-sm text-zinc-400 mb-1 flex justify-between">
                <span>Reading Speed</span>
                <span id="speedValue" class="text-purple-500 font-medium">Normal (1.0x)</span>
              </label>
              <input type="range" id="speedSlider" min="0.5" max="1.5" step="0.1" value="1.0" oninput="updateSpeedLabel(); saveSettings()" class="w-full accent-purple-500">
            </div>
          </div>
        </div>

        <div>
          <h3 class="text-purple-400 text-xs font-semibold tracking-wider mb-3 uppercase">Data Management</h3>
          <button id="clearDataBtn" onclick="clearAllSavedData()" class="w-full bg-zinc-950 hover:bg-red-900/30 text-red-400 border border-red-900/50 hover:border-red-500/50 py-2.5 rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
            <i class="fas fa-trash-alt"></i> Clear Saved Actions
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="sidebar" class="w-0 border-transparent opacity-0 flex flex-col h-full z-20 sidebar-transition overflow-hidden shrink-0">
    <div class="p-5 flex items-center justify-between border-b border-zinc-800 shrink-0 w-72">
      <div class="font-semibold text-xl tracking-tight text-zinc-200">Holy Bible Guide</div>
      <button onclick="toggleSidebar()" class="text-zinc-400 hover:text-purple-400">
        <i class="fas fa-chevron-left text-sm"></i>
      </button>
    </div>

    <div class="p-4 shrink-0 w-72">
      <button onclick="newChat()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3.5 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-md">
        <i class="fas fa-plus"></i> New Conversation
      </button>
    </div>

    <div class="px-4 flex-1 overflow-y-auto pb-4 w-72">
      <p class="text-purple-400/80 text-xs mb-3 px-3 font-semibold tracking-wider">QUICK PROMPTS</p>
      <div onclick="sendPrompt('Faith')" class="prompt-btn text-sm text-zinc-300">Faith</div>
      <div onclick="sendPrompt('Love')" class="prompt-btn text-sm text-zinc-300">Love</div>
      <div onclick="sendPrompt('Wisdom')" class="prompt-btn text-sm text-zinc-300">Wisdom</div>
      <div onclick="sendPrompt('Overcoming Fear')" class="prompt-btn text-sm text-zinc-300">Overcoming Fear</div>
      <div onclick="sendPrompt('Peace in Trials')" class="prompt-btn text-sm text-zinc-300">Peace in Trials</div>
      <div onclick="sendPrompt('Hope')" class="prompt-btn text-sm text-zinc-300">Hope</div>
      <div onclick="sendPrompt('Strength')" class="prompt-btn text-sm text-zinc-300">Strength</div>
      <div onclick="fetchRandomBibleVerse()" class="prompt-btn text-sm text-zinc-300">Random Verse</div>

      <div class="mt-8">
        <p class="text-purple-400/80 text-xs mb-3 px-3 font-semibold tracking-wider">SAVED ACTION SOLUTIONS</p>
        <div id="saved-prompts-list" class="space-y-2"></div>
      </div>
    </div>
  </div>

  <div class="flex-1 flex flex-col chat-container relative h-full min-w-0">
    
    <div class="oval-header mx-4 mt-4 px-6 py-4 flex items-center justify-between border border-zinc-800/60 shadow-xl z-10">
      <div class="flex items-center gap-4">
        <button onclick="toggleSidebar()" class="relative w-10 h-10 flex items-center justify-center text-zinc-400 hover:text-purple-300 rounded-3xl hover:bg-zinc-800 transition-all">
          <i class="fas fa-bars text-lg"></i>
          <span id="menuPulseDot" class="absolute top-1 right-2 flex h-2.5 w-2.5">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-purple-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-purple-500"></span>
          </span>
        </button>
        <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-violet-600 rounded-2xl flex items-center justify-center text-2xl font-bold text-white shadow-md">✝️</div>
        <div class="hidden md:block">
          <div class="text-xl font-bold tracking-tight text-zinc-100">Faith, Hope &amp; Wisdom</div>
          <div class="text-xs text-purple-200/60">Timeless guidance for life’s journey</div>
        </div>
      </div>
      <div class="flex items-center gap-3">

        <button id="langToggleBtn" onclick="toggleAudioLang()" title="Toggle Audio" class="w-8 h-8 flex items-center justify-center text-xs font-bold text-purple-500 border border-purple-500/30 rounded-lg hover:bg-purple-500/10 transition-all ml-2">
          EN
        </button>

        <button onclick="openSettings()" class="w-10 h-10 flex items-center justify-center text-zinc-400 hover:text-purple-300 rounded-3xl hover:bg-zinc-800 transition-all ml-2">
          <i class="fas fa-cog text-xl"></i>
        </button>

        <a href="https://allisfair777.github.io/Inner-Peace/WesternWisdom.html" class="w-10 h-10 flex items-center justify-center text-zinc-400 hover:text-purple-300 rounded-3xl hover:bg-zinc-800 transition-all ml-2" title="Return to Wisdom Nexus">
          <i class="fas fa-home text-xl"></i>
        </a>
      </div>
    </div>

    <div id="chat" class="flex-1 p-6 overflow-y-auto space-y-5 relative min-h-0">
      </div>

    <div class="p-5 border-t border-zinc-800/50 bg-zinc-950/80 z-10">
      <form onsubmit="sendMessage(event)" class="relative max-w-4xl mx-auto">
        <input id="userInput" type="text" autocomplete="off"
               class="w-full bg-zinc-900 border border-zinc-800 rounded-3xl px-7 py-4.5 pr-16 focus:outline-none focus:border-purple-500 text-base placeholder-zinc-500 text-zinc-100 shadow-inner transition-all"
               placeholder="Describe your situation or ask a question...">
        <button type="submit" 
                class="absolute right-3 top-1/2 -translate-y-1/2 bg-purple-600 hover:bg-purple-700 active:scale-95 text-white w-11 h-11 rounded-2xl flex items-center justify-center transition-all shadow-md">
          <i class="fas fa-paper-plane"></i>
        </button>
      </form>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    let audioLang = 'en'; 
    
    // ================= SETTINGS LOGIC =================
    let systemVoices = [];
    let appSettings = JSON.parse(localStorage.getItem('bibleSettings')) || {
      enVoiceURI: '',
      speechSpeed: 1.0
    };

    function populateVoiceList() {
      systemVoices = window.speechSynthesis.getVoices();
      const enSelect = document.getElementById('enVoiceSelect');
      
      enSelect.innerHTML = '<option value="">Default English Voice</option>';

      systemVoices.forEach(voice => {
        if (voice.lang.startsWith('en')) {
          const option = document.createElement('option');
          option.textContent = `${voice.name} (${voice.lang})`;
          option.value = voice.voiceURI;
          enSelect.appendChild(option);
        }
      });

      if (appSettings.enVoiceURI) enSelect.value = appSettings.enVoiceURI;
      document.getElementById('speedSlider').value = appSettings.speechSpeed;
      updateSpeedLabel();
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = populateVoiceList;
    }

    function updateSpeedLabel() {
      const val = parseFloat(document.getElementById('speedSlider').value);
      let label = "Normal";
      if (val < 1.0) label = "Slow";
      if (val > 1.0) label = "Fast";
      document.getElementById('speedValue').innerText = `${label} (${val.toFixed(1)}x)`;
    }

    function saveSettings() {
      appSettings.enVoiceURI = document.getElementById('enVoiceSelect').value;
      appSettings.speechSpeed = parseFloat(document.getElementById('speedSlider').value);
      localStorage.setItem('bibleSettings', JSON.stringify(appSettings));
    }

    function openSettings() {
      const modal = document.getElementById('settingsModal');
      const content = document.getElementById('settingsContent');
      modal.classList.remove('opacity-0', 'pointer-events-none');
      content.classList.remove('scale-95');
      if (systemVoices.length === 0) populateVoiceList(); 
    }

    function closeSettings() {
      const modal = document.getElementById('settingsModal');
      const content = document.getElementById('settingsContent');
      modal.classList.add('opacity-0', 'pointer-events-none');
      content.classList.add('scale-95');
    }

    function clearAllSavedData() {
      if (savedPrompts.length === 0) return; 
      if(confirm("Are you sure you want to delete all your saved Action Solutions?")) {
        localStorage.removeItem('bibleSavedPrompts');
        savedPrompts = [];
        renderSavedPrompts();
        closeSettings();
      }
    }
    // ================= END SETTINGS LOGIC =================

    const wisdomDb = {
      faith: [
        { title: "Faith That Moves Mountains", book: "Matthew", ch: 17, verse: 20, verseText: "He replied, “Because you have so little faith. Truly I tell you, if you have faith as small as a mustard seed, you can say to this mountain, ‘Move from here to there,’ and it will move. Nothing will be impossible for you.”", translation: "Faith as small as a mustard seed can move mountains." },
        { title: "The Assurance of Faith", book: "Hebrews", ch: 11, verse: 1, verseText: "Now faith is confidence in what we hope for and assurance about what we do not see.", translation: "Faith is being sure of what we hope for and certain of what we do not see." },
        { title: "Assurance of Things Unseen", book: "Hebrews", ch: 11, verse: 1, verseText: "Now faith is confidence in what we hope for and assurance about what we do not see." },
        { title: "Trust Wholeheartedly", book: "Proverbs", ch: 3, verse: 5, verseText: "Trust in the Lord with all your heart and lean not on your own understanding; in all your ways submit to him, and he will make your paths straight." },
        { title: "Moving Mountains", book: "Matthew", ch: 17, verse: 20, verseText: "Truly I tell you, if you have faith as small as a mustard seed, you can say to this mountain, 'Move from here to there,' and it will move. Nothing will be impossible for you." }
      ] ,
      love: [
        { title: "The Greatest Commandment", book: "1 Corinthians", ch: 13, verse: 13, verseText: "And now these three remain: faith, hope and love. But the greatest of these is love.", translation: "The greatest of these is love." },
        { title: "Cast Your Cares", book: "1 Peter", ch: 5, verse: 7, verseText: "Cast all your anxiety on him because he cares for you." },
        { title: "Love One Another", book: "John", ch: 13, verse: 34, verseText: "A new command I give you: Love one another. As I have loved you, so you must love one another.", translation: "Love one another as I have loved you." }
      ],
      wisdom: [
        { title: "Ask for Wisdom", book: "James", ch: 1, verse: 5, verseText: "If any of you lacks wisdom, you should ask God, who gives generously to all without finding fault, and it will be given to you.", translation: "Ask God for wisdom and He gives generously." },
        { title: "The Fear of the Lord", book: "Proverbs", ch: 9, verse: 10, verseText: "The fear of the Lord is the beginning of wisdom, and knowledge of the Holy One is understanding.", translation: "The fear of the Lord is the beginning of wisdom." }
      ],
      fear: [
        { title: "Do Not Fear", book: "Isaiah", ch: 41, verse: 10, verseText: "So do not fear, for I am with you; do not be dismayed, for I am your God. I will strengthen you and help you; I will uphold you with my righteous right hand.", translation: "Do not fear, for I am with you." },
        { title: "Do Not Worry About Tomorrow", book: "Matthew", ch: 6, verse: 34, verseText: "Therefore do not worry about tomorrow, for tomorrow will worry about itself. Each day has enough trouble of its own." },
        { title: "God Has Not Given Us Fear", book: "2 Timothy", ch: 1, verse: 7, verseText: "For God has not given us a spirit of fear, but of power and of love and of a sound mind.", translation: "God has not given us a spirit of fear." }
      ],
      peace: [
        { title: "Peace That Surpasses Understanding", book: "Philippians", ch: 4, verse: 7, verseText: "And the peace of God, which transcends all understanding, will guard your hearts and your minds in Christ Jesus.", translation: "The peace of God will guard your hearts." },
        { title: "Peace Beyond Understanding", book: "Philippians", ch: 4, verse: 6, verseText: "Do not be anxious about anything, but in every situation, by prayer and petition, with thanksgiving, present your requests to God." },
        { title: "My Peace I Give You", book: "John", ch: 14, verse: 27, verseText: "Peace I leave with you; my peace I give you. I do not give to you as the world gives. Do not let your hearts be troubled and do not be afraid.", translation: "My peace I give you." }
      ],
      strength: [
        { title: "I Can Do All Things", book: "Philippians", ch: 4, verse: 13, verseText: "I can do all this through him who gives me strength.", translation: "I can do all things through Christ who strengthens me." },
        { title: "All Things Through Christ", book: "Philippians", ch: 4, verse: 13, verseText: "I can do all this through him who gives me strength." },
        { title: "Do Not Fear", book: "Isaiah", ch: 41, verse: 10, verseText: "So do not fear, for I am with you; do not be dismayed, for I am your God. I will strengthen you and help you; I will uphold you with my righteous right hand." },
        { title: "My Shield", book: "Psalms", ch: 28, verse: 7, verseText: "The Lord is my strength and my shield; my heart trusts in him, and he helps me." },
        { title: "Power in Weakness", book: "2 Corinthians", ch: 12, verse: 9, verseText: "But he said to me, 'My grace is sufficient for you, for my power is made perfect in weakness.'" }
      ],
     hope: [
      { title: "Hope in the Lord", book: "Isaiah", ch: 40, verse: 31, verseText: "But those who hope in the Lord will renew their strength. They will soar on wings like eagles; they will run and not grow weary, they will walk and not be faint.", translation: "Those who hope in the Lord will renew their strength." },
      { title: "A Future and a Hope", book: "Jeremiah", ch: 29, verse: 11, verseText: "For I know the plans I have for you, declares the Lord, plans for welfare and not for evil, to give you a future and a hope." },
      { title: "Renewed Strength", book: "Isaiah", ch: 40, verse: 31, verseText: "But those who hope in the Lord will renew their strength. They will soar on wings like eagles; they will run and not grow weary, they will walk and not be faint." },
      { title: "Abounding in Hope", book: "Romans", ch: 15, verse: 13, verseText: "May the God of hope fill you with all joy and peace as you trust in him, so that you may overflow with hope by the power of the Holy Spirit." },
      { title: "An Anchor for the Soul", book: "Hebrews", ch: 6, verse: 19, verseText: "We have this hope as an anchor for the soul, firm and secure." }
     ],
     anxiety: [
      { title: "Delivered from Fear", book: "Psalms", ch: 34, verse: 4, verseText: "I sought the Lord, and he answered me; he delivered me from all my fears." }
     ]
    };

    const randomVersePool = [
      { book: "Philippians", ch: 4, verse: 13, verseText: "I can do all this through him who gives me strength.", translation: "I can do all things through Christ who strengthens me." },
      { book: "Psalm", ch: 23, verse: 1, verseText: "The Lord is my shepherd, I lack nothing.", translation: "The Lord is my shepherd." },
      { book: "Matthew", ch: 6, verse: 34, verseText: "Therefore do not worry about tomorrow, for tomorrow will worry about itself. Each day has enough trouble of its own.", translation: "Do not worry about tomorrow." },
      { book: "Romans", ch: 8, verse: 28, verseText: "And we know that in all things God works for the good of those who love him, who have been called according to his purpose.", translation: "All things work together for good." },
      { book: "Jeremiah", ch: 29, verse: 11, verseText: "For I know the plans I have for you,” declares the Lord, “plans to prosper you and not to harm you, plans to give you hope and a future.", translation: "Plans to prosper you and give you hope." }
    ];

    function toggleSidebar() {
      const pulseDot = document.getElementById('menuPulseDot');
      if (pulseDot) pulseDot.remove();

      const sidebar = document.getElementById('sidebar');
      if (sidebar.classList.contains('w-72')) {
        sidebar.className = "w-0 border-transparent opacity-0 flex flex-col h-full z-20 sidebar-transition overflow-hidden shrink-0";
      } else {
        sidebar.className = "w-72 bg-zinc-950/95 border-r border-zinc-800 flex flex-col h-full z-20 sidebar-transition overflow-hidden shrink-0";
      }
    }

    function closeSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.className = "w-0 border-transparent opacity-0 flex flex-col h-full z-20 sidebar-transition overflow-hidden shrink-0";
    }

    let savedPrompts = JSON.parse(localStorage.getItem('bibleSavedPrompts')) || [];

    function renderSavedPrompts() {
      const container = document.getElementById('saved-prompts-list');
      const clearBtn = document.getElementById('clearDataBtn');
      
      if (clearBtn) {
        if (savedPrompts.length === 0) {
            clearBtn.disabled = true;
            clearBtn.className = "w-full bg-zinc-900 text-zinc-600 border border-zinc-800 py-2.5 rounded-xl text-sm flex items-center justify-center gap-2 cursor-not-allowed transition-colors";
        } else {
            clearBtn.disabled = false;
            clearBtn.className = "w-full bg-zinc-950 hover:bg-red-900/30 text-red-400 border border-red-900/50 hover:border-red-500/50 py-2.5 rounded-xl text-sm transition-colors flex items-center justify-center gap-2";
        }
      }

      if (savedPrompts.length === 0) {
        container.innerHTML = '<div class="text-zinc-600 text-xs px-3 italic">No configurations saved yet.</div>';
        return;
      }
      container.innerHTML = savedPrompts.map((p, index) => `
        <div class="prompt-btn text-sm flex justify-between items-center relative overflow-hidden group" title="${p.prompt || p.title}">
          <div class="truncate flex-1 pr-2 py-0.5 text-zinc-300 hover:text-purple-300" onclick="loadSavedVerse(${index})">
            ${p.name}
          </div>
          <button onclick="event.stopPropagation(); deleteSavedPrompt(${index})" class="text-zinc-500 hover:text-red-400 transition-colors px-1 z-10">
            <i class="fas fa-trash-alt text-xs"></i>
          </button>
        </div>
      `).join('');
    }

    function loadSavedVerse(index) {
      closeSidebar(); 
      const item = savedPrompts[index];
      if (!item) return;
      if (item.prompt && item.prompt !== "Random Selection" && item.prompt !== "Direct Search") {
        appendMessage('user', item.prompt);
      } else {
        appendMessage('user', `Reviewed Saved Entry: "${item.name}"`);
      }
      const html = buildVerseHTML(item.title, item.book, item.ch, item.verse, item.verseText, item.translation, null);
      appendMessage('bot', html);
    }

    function bookmarkExactVerse(promptText, title, book, ch, verse, verseText, translation) {
      let name = prompt("Give this resolution entry a unique name:");
      if (!name || name.trim() === "") return;
      name = name.trim();

      if (savedPrompts.some(p => p.name.toLowerCase() === name.toLowerCase())) {
        alert("A configuration with this name already exists.");
        return;
      }

      savedPrompts.push({
        name: name, prompt: promptText, title: title, book: book, ch: ch, verse: verse, 
        verseText: verseText, translation: translation
      });
      localStorage.setItem('bibleSavedPrompts', JSON.stringify(savedPrompts));
      renderSavedPrompts();
    }

    function deleteSavedPrompt(index) {
      if (confirm("Remove this exact resolution layout from storage?")) {
        savedPrompts.splice(index, 1);
        localStorage.setItem('bibleSavedPrompts', JSON.stringify(savedPrompts));
        renderSavedPrompts();
      }
    }

    function setupDynamicBackground() {
      const backgroundImages = [
        'https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&w=1400&q=60',
        'https://images.unsplash.com/photo-1518241353330-0f7941c2d9b5?auto=format&fit=crop&w=1400&q=60'
      ];
      const selectedImg = backgroundImages[Math.floor(Math.random() * backgroundImages.length)];
      document.body.style.backgroundImage = `linear-gradient(rgba(9, 9, 11, 0.92), rgba(9, 9, 11, 0.95)), url('${selectedImg}')`;
    }

    function appendMessage(sender, html) {
      const div = document.createElement('div');
      div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full`;
      div.innerHTML = `
        <div class="max-w-[82%] ${sender === 'user' ? 'message-user' : 'message-bot'} px-6 py-4 text-[15.5px] leading-relaxed shadow-md">
          <div>${html}</div>
        </div>
      `;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div.querySelector('.message-bot') || div.querySelector('.message-user');
    }

    function matchIntentData(text) {
      const lower = text.toLowerCase();
      let matchedArray = null;

      if (/faith|believe|trust|doubt|skeptical|unsure|lost|questioning|god|cynical/i.test(lower)) matchedArray = wisdomDb.faith;
      else if (/love|charity|compassion|forgive|hate|bitter|resent|enemy|relationship|marriage|broken/i.test(lower)) matchedArray = wisdomDb.love;
      else if (/wisdom|proverb|knowledge|confused|decision|choice|guidance|direction|understand|advice/i.test(lower)) matchedArray = wisdomDb.wisdom;
      else if (/fear|anxiety|worry|afraid|scared|panic|stress|overwhelmed|terror|nervous/i.test(lower)) matchedArray = wisdomDb.fear;
      else if (/peace|calm|still|chaos|turmoil|restless|storm|quiet|noise/i.test(lower)) matchedArray = wisdomDb.peace;
      else if (/hope|future|discouraged|depressed|despair|hopeless|darkness|light/i.test(lower)) matchedArray = wisdomDb.hope;
      else if (/strength|strong|power|weak|tired|exhausted|burnout|give up|unable|burden|heavy/i.test(lower)) matchedArray = wisdomDb.strength;

      if (matchedArray) return matchedArray[Math.floor(Math.random() * matchedArray.length)];

      const fallback = randomVersePool[Math.floor(Math.random() * randomVersePool.length)];
      return { title: "Divine Insight", book: fallback.book, ch: fallback.ch, verse: fallback.verse, verseText: fallback.verseText, translation: fallback.translation };
    }
    
    function toggleAudioLang() {
      alert("English audio is currently active.");
    }

    function resetAllSpeakers() {
        document.querySelectorAll('.speaker-icon').forEach(icon => {
            icon.classList.remove('fa-volume-up', 'text-purple-500');
            icon.classList.add('fa-volume-mute', 'text-zinc-400');
        });
    }

    let utteranceQueue = []; 

    function toggleAudio(btn, text, chapter, verse) {
      const icon = btn.querySelector('i');
      const isCurrentlyPlaying = icon.classList.contains('fa-volume-up');
      
      window.speechSynthesis.cancel();
      utteranceQueue = []; 
      resetAllSpeakers();

      if (isCurrentlyPlaying) return;

      icon.classList.remove('fa-volume-mute', 'text-zinc-400');
      icon.classList.add('fa-volume-up', 'text-purple-500');

      const sentences = [
        `${chapter} verse ${verse}`,
        text
      ];

      let completedCount = 0;

      sentences.forEach((sentenceText) => {
          const msg = new SpeechSynthesisUtterance(sentenceText);
          msg.rate = appSettings.speechSpeed || 1.0;
          
          const targetVoiceURI = appSettings.enVoiceURI;
          if (targetVoiceURI && systemVoices.length > 0) {
            const selectedVoice = systemVoices.find(v => v.voiceURI === targetVoiceURI);
            if (selectedVoice) msg.voice = selectedVoice;
          }
          
          msg.onend = () => {
              completedCount++;
              if (completedCount === sentences.length) {
                  resetAllSpeakers();
                  utteranceQueue = [];
              }
          };
          
          window.speechSynthesis.speak(msg);
      });
    }
    
    function buildVerseHTML(title, book, chapter, verse, verseText, translation, associatedPrompt = null) {
      let toolsHTML = '';
      
      const safeTitle = title.replace(/'/g, "\\'").replace(/"/g, "&quot;");
      const safeVerseText = verseText.replace(/'/g, "\\'").replace(/\n/g, "\\n");
      const safeTrans = translation.replace(/'/g, "\\'").replace(/"/g, "&quot;");
      const safePrompt = associatedPrompt ? associatedPrompt.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';

      let bookmarkBtn = associatedPrompt ? `
        <button onclick="bookmarkExactVerse('${safePrompt}', '${safeTitle}', '${book}', ${chapter}, ${verse}, '${safeVerseText}', '${safeTrans}')" 
                class="text-[11px] text-purple-300/80 hover:text-purple-300 flex items-center gap-1 bg-zinc-800/80 hover:bg-zinc-700/80 px-2.5 py-1 rounded-md transition-all border border-zinc-700/40">
          <i class="fas fa-bookmark text-[10px]"></i> Save Action
        </button>
      ` : '';
      
      toolsHTML = `
        <div class="mt-3 pt-2 border-t border-zinc-800/60 flex justify-between items-center">
          <div class="flex gap-2">
             <button onclick="toggleAudio(this, '${safeVerseText}', '${book} ${chapter}:${verse}', ${verse})" class="hover:text-purple-400 transition-colors p-1" title="Play Audio">
               <i class="fas fa-volume-mute speaker-icon text-zinc-400 text-lg"></i>
             </button>
          </div>
          ${bookmarkBtn}
        </div>
      `;
      
      return `
        <strong class="text-purple-400 block mb-2">${title} (${book} ${chapter}:${verse})</strong>
        <div class="bible-verse">"${verseText}"</div>
        <div class="text-zinc-300 italic border-l-2 border-purple-500/40 pl-3 mt-3 leading-relaxed">"${translation}"</div>
        ${toolsHTML}
      `;
    }

    // ================= API FETCHING & CACHING =================
    async function getBibleVerseData(reference) {
      const cacheKey = `bible_cache_${reference.toLowerCase().replace(/\s+/g, '')}`;
      const cached = localStorage.getItem(cacheKey);
      if (cached) return JSON.parse(cached);

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 8000); // 8-second timeout for API

      try {
        // We request the World English Bible (web) translation for modern readability
        const res = await fetch(`https://bible-api.com/${encodeURIComponent(reference)}?translation=web`, {
          signal: controller.signal
        });
        clearTimeout(timeoutId);

        if (!res.ok) throw new Error('API fetch failed');
        const data = await res.json();
        
        if (!data.verses || data.verses.length === 0) throw new Error('No verses found');

        const result = {
          book: data.verses[0].book_name,
          ch: data.verses[0].chapter,
          verse: data.verses[0].verse,
          verseText: data.text.trim(),
          translation: data.translation_name || "World English Bible"
        };
        
        localStorage.setItem(cacheKey, JSON.stringify(result));
        return result;
      } catch (error) {
        clearTimeout(timeoutId);
        throw error; // Will be caught by the sendMessage/fetchRandom fallback logic
      }
    }

    // ================= UPDATED ASYNC SEND MESSAGE =================
    async function sendMessage(e, explicitText = null) {
      if (e && e.preventDefault) e.preventDefault();
      
      const input = document.getElementById('userInput');
      const msg = explicitText ? explicitText.trim() : input.value.trim();
      if (!msg) return;

      appendMessage('user', msg);
      if (!explicitText) input.value = '';

      const thinking = appendMessage('bot', '<span class="text-purple-400 font-medium animate-pulse">Seeking guidance in Scripture...</span>');

      try {
        // 1. Determine target Reference from user's intent
        // Check if user directly typed a verse like "John 3:16"
        const isDirectRef = /([1-3]?\s*[A-Za-z]+)\s+(\d+):(\d+)/.test(msg);
        let targetReference = msg;
        let title = "Divine Insight";
        
        if (!isDirectRef) {
          // If they typed a concept (e.g., "Faith"), match to a local reference to ask the API for.
          const localMatch = matchIntentData(msg);
          targetReference = `${localMatch.book} ${localMatch.ch}:${localMatch.verse}`;
          title = localMatch.title || title;
        } else {
          title = "Scripture Search";
        }

        // 2. Await API Fetch
        const apiData = await getBibleVerseData(targetReference);
        
        thinking.parentElement.remove();
        appendMessage('bot', buildVerseHTML(title, apiData.book, apiData.ch, apiData.verse, apiData.verseText, apiData.translation, msg));

      } catch (error) {
        console.warn("API Error, falling back to local wisdomDb:", error);
        
        // 3. Native Fallback
        const matched = matchIntentData(msg);
        thinking.parentElement.remove();
        appendMessage('bot', buildVerseHTML(matched.title, matched.book, matched.ch, matched.verse, matched.verseText, matched.translation, msg));
      }
    }

    function sendPrompt(promptText) {
      closeSidebar(); 
      setTimeout(() => sendMessage(null, promptText), 80);
    }

    // ================= UPDATED RANDOM VERSE =================
    async function fetchRandomBibleVerse() {
      closeSidebar(); 
      appendMessage('user', "Random Verse"); 
      
      const loadingMsg = appendMessage('bot', '<span class="text-purple-400 font-medium animate-pulse">Opening the Scriptures...</span>');

      try {
        const fallback = randomVersePool[Math.floor(Math.random() * randomVersePool.length)];
        const targetReference = `${fallback.book} ${fallback.ch}:${fallback.verse}`;
        
        const apiData = await getBibleVerseData(targetReference);
        loadingMsg.parentElement.remove();
        appendMessage('bot', buildVerseHTML("Random Insight", apiData.book, apiData.ch, apiData.verse, apiData.verseText, apiData.translation, "Random Selection"));
      } catch (error) {
        console.warn("API Error, falling back to local pool:", error);
        const fallback = randomVersePool[Math.floor(Math.random() * randomVersePool.length)];
        loadingMsg.parentElement.remove();
        appendMessage('bot', buildVerseHTML("Random Insight", fallback.book, fallback.ch, fallback.verse, fallback.verseText, fallback.translation, "Random Selection"));
      }
    }

          <div class="absolute inset-0 opacity-10 bg-cover bg-center mix-blend-luminosity pointer-events-none" 
               style="background-image: url('Bible.jpg');">

          <div class="relative z-10 flex flex-col items-center justify-center gap-4">
            
            <div class="rounded-full p-1 bg-gradient-to-br from-purple-500 to-violet-600 shadow-lg">

    function newChat() {

    window.onload = () => {
      setupDynamicBackground();
      renderSavedPrompts();
      chat.innerHTML = getOvalHTML();
      if (window.speechSynthesis.getVoices().length > 0) {
        populateVoiceList();
      }
    };
  </script>
