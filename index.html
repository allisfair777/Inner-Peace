<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chessboard Test</title>
  <!-- Chessboard.js CSS from cdnjs -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboardjs/1.0.0/chessboard.min.css" />
  <!-- jQuery from cdnjs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <!-- Chessboard.js from cdnjs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboardjs/1.0.0/chessboard.min.js"></script>
  <!-- Chess.js from cdnjs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.4.0/chess.min.js"></script>
</head>
<body>
  <div id="myBoard" style="width: 400px; height: 400px;"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      console.log('DOM loaded, checking libraries...');
      if (typeof $ === 'undefined') {
        console.error('jQuery not loaded!');
        return;
      }
      if (typeof Chessboard === 'undefined') {
        console.error('Chessboard.js not loaded!');
        return;
      }
      if (typeof Chess === 'undefined') {
        console.error('Chess.js not loaded!');
        return;
      }
      console.log('Libraries loaded, initializing board...');

      const board = Chessboard('myBoard', {
        draggable: true,
        position: 'start',
        onDragStart: function() {
          console.log('Drag started!');
        },
        onDrop: function() {
          console.log('Drop detected!');
        }
      });

      if (!board) {
        console.error('Chessboard initialization failed!');
        return;
      }
      console.log('Chessboard initialized successfully!');
    });
  </script>
</body>
</html>
