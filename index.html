<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Inner Peace & Happiness Guide</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');

    :root {
      --accent: #fb923c;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f1f5f9;
    }

    .container { 
      max-width: 1100px; 
      width: 100%; 
      padding: 20px; 
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.08);
      padding: 18px 40px;
      border-radius: 50px;
      margin-bottom: 30px;
      border: 1px solid rgba(255,255,255,0.15);
      gap: 16px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fed7aa, #fdba74);
      color: #1e2937;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 29px;
      font-weight: bold;
      border: 3px solid rgba(251, 191, 36, 0.75);
      box-shadow: 0 0 16px rgba(251, 191, 36, 0.4);
      flex-shrink: 0;
    }

    .header-content {
      flex: 1;
      text-align: center;
    }

    h1 { 
      font-family: 'Playfair Display', serif; 
      font-size: 3.2rem; 
      margin: 0; 
      color: #f8fafc; 
      text-shadow: 0 4px 20px rgba(0,0,0,0.6); 
    }

    .subtitle { 
      font-size: 1.2rem; 
      opacity: 0.9; 
      margin: 8px 0 0 0; 
      color: #cbd5e1; 
    }

    .settings-btn {
      background: none;
      border: none;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #cbd5e1;
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .settings-btn:hover {
      color: #facc15;
      transform: rotate(45deg) scale(1.1);
      background: rgba(255,255,255,0.1);
    }

    .settings-btn svg {
      width: 28px;
      height: 28px;
    }

    .card {
      background: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.85)), 
                  url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&q=80') center/cover no-repeat;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 35px 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .form-row {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
    }

    .form-group { flex: 0 0 auto; }
    label { 
      display: block; 
      margin-bottom: 8px; 
      font-weight: 600; 
      font-size: 1.02rem; 
      color: #cbd5e1; 
    }

    #domain   { width: 240px; }
    #trigger  { width: 390px; }
    #impact   { width: 160px; }

    select, .generate-btn {
      padding: 13px 20px;
      border: 2px solid rgba(148, 163, 184, 0.35);
      border-radius: 50px;
      background: rgba(255,255,255,0.1);
      color: #f1f5f9;
      font-size: 1rem;
      font-weight: 500;
      height: 52px;
    }

    select:focus, .generate-btn:focus { 
      outline: none; 
      border-color: #93c5fd; 
    }

    .generate-btn {
      background: linear-gradient(135deg, #fed7aa, #fb923c);
      color: #1e2937;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid rgba(251, 191, 36, 0.5);
      white-space: nowrap;
      min-width: 170px;
      height: 52px;
    }

    .generate-btn:hover {
      background: linear-gradient(135deg, #fb923c, #f97316);
      transform: translateY(-1px);
    }

    .save-btn {
      padding: 14px 32px;
      font-size: 1.18rem;
      font-weight: 600;
      background: linear-gradient(135deg, #64748b, #475569);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      height: 52px;
    }

    .save-btn:hover {
      background: linear-gradient(135deg, #475569, #334155);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(71, 85, 105, 0.4);
    }

    .result, .history {
      margin-top: 30px; 
      background: rgba(255,255,255,0.08); 
      padding: 28px; 
      border-radius: 16px; 
    }

    .history { 
      min-height: 155px;
      max-height: 235px; 
      overflow-y: auto;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    /* Mobile-first */
    @media (max-width: 768px) {
      .container { padding: 12px; }
      h1 { font-size: 2.2rem !important; }
      .header { padding: 14px 20px; flex-direction: row; gap: 12px; border-radius: 30px; }
      .avatar { width: 44px; height: 44px; font-size: 26px; }
      .card { padding: 24px 20px; border-radius: 20px; }
      .form-row { flex-direction: column; align-items: stretch; gap: 16px; }
      #domain, #trigger, #impact { width: 100% !important; }
      .generate-btn { width: 100%; height: 56px; font-size: 1.1rem; }
    }

    @supports (padding: max(0px)) {
      body {
        padding-top: max(20px, env(safe-area-inset-top));
        padding-bottom: max(20px, env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="avatar">ॐ</div>

      <div class="header-content">
        <h1>Inner Peace & Happiness</h1>
        <p class="subtitle">Create calm, clear resolutions to difficult situations</p>
      </div>

      <button class="settings-btn" onclick="alert('Settings coming soon ✨')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 002.573-1.066c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 00.817 1.194 1.724 1.724 0 01.817 1.194c-.94 1.543.827 3.31 2.37 2.37 1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 01-2.573 1.066 1.724 1.724 0 01-.817 1.194c.94 1.543-.827 3.31-2.37 2.37a1.724 1.724 0 01-.817 1.194c-1.756.426-1.756 2.924 0 3.35a1.724 1.724 0 01-2.573 1.066c-1.543-.94-3.31.826-2.37 2.37a1.724 1.724 0 01-.817 1.194c-.94 1.543.827 3.31 2.37 2.37 1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 01-2.573 1.066 1.724 1.724 0 01-.817-1.194c-.94-1.543.827-3.31 2.37-2.37 1.756-.426 1.756-2.924 0-3.35a1.724 1.724 0 01-2.573-1.066 1.724 1.724 0 01-.817-1.194c-.94-1.543.827-3.31 2.37-2.37z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </button>
    </div>
  
    <div class="card">
      <!-- Your existing card content goes here (form, result, history, etc.) -->
      <!-- Paste the rest of your body content from the previous version here -->
      <!-- For brevity, I'm showing only the header above. Replace the card content with your original one. -->

      <div class="form-row">
        <div class="form-group">
          <label>Domain</label>
          <select id="domain">
            <option value="">Select Domain</option>
            <option value="Professional" selected>Professional</option>
            <option value="Personal">Personal</option>
            <option value="Both">Both</option>
          </select>
        </div>

        <div class="form-group">
          <label>Trigger / Situation</label>
          <select id="trigger"></select>
        </div>

        <div class="form-group">
          <label>Impact</label>
          <select id="impact">
            <option value="High">🔴 High</option>
            <option value="Medium">🟡 Medium</option>
            <option value="Low" selected>🟢 Low</option>
          </select>
        </div>

        <button class="generate-btn" onclick="generateGuidance()">Resolution Plan</button>
      </div>

      <div id="result" class="result"></div>

      <div class="history">
        <div class="history-header">
          <h3 style="margin:0; color:#e0f2fe;">Saved Plans</h3>
          <select id="sortSelect" onchange="loadHistory()">
            <option value="date">Sort by Date (Newest)</option>
            <option value="domain">Sort by Domain</option>
            <option value="impact">Sort by Impact</option>
            <option value="trigger">Sort by Trigger</option>
          </select>
        </div>
        <div id="historyList"></div>
      </div>

      <div class="wisdom" id="wisdom"></div>
    </div>
  </div>

  <!-- Paste your full <script> here from the previous version -->
  <script>
    // ... (your entire script from the original version)
    // I kept it exactly the same unless you want further optimizations
  </script>
</body>
</html>
