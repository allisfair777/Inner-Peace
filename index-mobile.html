<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-title" content="Inner Peace">
  <link rel="manifest" href="manifest.json">
  
  <title>Inner Peace & Happiness</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');

    body {
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #0f172a;
      color: #f1f5f9;
      -webkit-tap-highlight-color: transparent;
    }

    .container { 
      width: 100%; 
      padding: 12px;
      padding-top: max(20px, env(safe-area-inset-top));
      padding-bottom: max(30px, env(safe-area-inset-bottom));
      box-sizing: border-box;
    }

    .header {
      background: rgba(255,255,255,0.08);
      padding: 16px 20px;
      border-radius: 9999px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fed7aa, #fdba74);
      color: #1e2937;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      border: 3px solid rgba(251, 191, 36, 0.8);
    }

    h1 { 
      font-family: 'Playfair Display', serif; 
      font-size: 2rem; 
      margin: 0; 
      color: #f8fafc; 
    }

    .card {
      background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.92)), 
                  url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&q=80') center/cover;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 28px 22px;
    }

    select, button, textarea {
      width: 100%;
      padding: 14px 16px;
      margin: 8px 0;
      border-radius: 9999px;
      font-size: 1.05rem;
      background: rgba(255,255,255,0.1);
      color: white;
      border: 2px solid rgba(148,163,184,0.4);
    }

    .generate-btn {
      background: linear-gradient(135deg, #fed7aa, #fb923c);
      color: #1e2937;
      font-weight: 700;
      height: 58px;
      border: none;
      font-size: 1.15rem;
      margin-top: 12px;
    }

    .result, .history {
      margin-top: 25px;
      background: rgba(255,255,255,0.08);
      padding: 22px;
      border-radius: 20px;
    }

    .label { color: #bae6fd; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="avatar">ॐ</div>
      <div style="flex:1; text-align:center;">
        <h1>Inner Peace & Happiness</h1>
        <p style="margin:4px 0 0 0; color:#cbd5e1;">Create calm, clear resolutions</p>
      </div>
      <button onclick="alert('Settings coming soon ✨')" style="background:none;border:none;color:#cbd5e1;font-size:1.8rem;">⚙️</button>
    </div>

    <div class="card">
      <div>
        <label>Domain</label>
        <select id="domain"></select>
      </div>

      <div>
        <label>Trigger / Situation</label>
        <select id="trigger"></select>
      </div>

      <div>
        <label>Impact</label>
        <select id="impact">
          <option value="Low" selected>🟢 Low</option>
          <option value="Medium">🟡 Medium</option>
          <option value="High">🔴 High</option>
        </select>
      </div>

      <button class="generate-btn" onclick="generateGuidance()">Resolution Plan</button>

      <div id="result" class="result"></div>

      <div class="history">
        <h3 style="color:#e0f2fe;margin:0 0 12px 0;">Saved Plans</h3>
        <div id="historyList"></div>
      </div>
    </div>
  </div>

  <script>
    const triggers = {
      Professional: ["Fear of layoffs / Job insecurity", "Burnout / Overwork", "Toxic boss / Politics", "Career stagnation"],
      Personal: ["Emotional pain / Rejection", "Jealousy / Envy", "Grief (loss or change)"],
      Both: ["Fear of layoffs", "Grief", "Jealousy"]
    };

    const gitaWisdom = [
      "Perform your duty equipoised, abandoning all attachment... — Bhagavad Gita 2.48",
      "With the mind unattached to external contacts, one finds happiness within. — Bhagavad Gita 5.21",
      "Abandon all varieties of dharma and simply surrender unto Me. — Bhagavad Gita 18.66"
    ];

    let currentPlan = null;

    const domainSelect = document.getElementById('domain');
    const triggerSelect = document.getElementById('trigger');

    function populateDomain() {
      domainSelect.innerHTML = `
        <option value="Professional" selected>Professional</option>
        <option value="Personal">Personal</option>
        <option value="Both">Both</option>
      `;
      populateTriggers();
    }

    function populateTriggers() {
      triggerSelect.innerHTML = '';
      (triggers[domainSelect.value] || []).forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        triggerSelect.appendChild(opt);
      });
    }

    domainSelect.addEventListener('change', populateTriggers);

    window.onload = () => {
      populateDomain();
      loadHistory();
    };

    function generateGuidance() {
      const domain = domainSelect.value;
      const trigger = triggerSelect.value;
      const impact = document.getElementById('impact').value;

      if (!domain || !trigger) {
        alert("Please select Domain and Trigger");
        return;
      }

      let suggestion = domain === "Professional" || domain === "Both" 
        ? "Skill-building + Resume updates + Networking + Focus on what you can control"
        : "Acceptance + Self-Compassion + Witness the emotion without judgment";

      currentPlan = { domain, trigger, impact, suggestion, date: new Date().toLocaleString() };

      const html = `
        <h2 style="margin-bottom:15px;">${domain} — ${trigger}</h2>
        <p><strong>Impact:</strong> <span style="color:${impact==='High'?'#ef4444':impact==='Medium'?'#fbbf24':'#4ade80'}">● ${impact}</span></p>
        <p><strong>How to Detach:</strong><br>STOP → Pause & Breathe deeply.</p>
        <p><strong>Recommended Actions:</strong><br>${suggestion}</p>
        
        <textarea id="supportTextarea" placeholder="Yoga, Journaling, Talk to mentor..."></textarea>
        <button onclick="saveCurrentPlan()" style="margin-top:10px;width:100%;padding:14px;background:#64748b;">Save Plan</button>
      `;

      document.getElementById('result').innerHTML = html;
    }

    function saveCurrentPlan() {
      if (!currentPlan) return;
      currentPlan.supportIdeas = document.getElementById('supportTextarea').value || "";

      let plans = JSON.parse(localStorage.getItem('detachmentPlans') || '[]');
      plans.unshift(currentPlan);
      localStorage.setItem('detachmentPlans', JSON.stringify(plans));
      
      loadHistory();
      alert("✅ Plan Saved!");
    }

    function loadHistory() {
      const list = document.getElementById('historyList');
      let plans = JSON.parse(localStorage.getItem('detachmentPlans') || '[]');
      
      if (plans.length === 0) {
        list.innerHTML = '<p style="color:#94a3b8;">No saved plans yet.</p>';
        return;
      }

      list.innerHTML = plans.map((plan, i) => `
        <div style="background:rgba(255,255,255,0.1);padding:12px;margin-bottom:10px;border-radius:12px;">
          <strong>${plan.domain} — ${plan.trigger}</strong><br>
          <small>${plan.date}</small>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
