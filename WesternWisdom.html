<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Western Wisdom Nexus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e2937); }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
    .portal-card { transition: all 0.3s ease; }
    .portal-card:hover { transform: translateY(-4px) scale(1.02); }
    
    @media (max-width: 640px) {
      .container-padding { padding: 1.25rem 1rem; }
      .icon-size { width: 68px; height: 68px; }
    }
  </style>
</head>
<body class="min-h-screen text-white">
  <div class="max-w-4xl mx-auto container-padding pt-10 pb-10">

    <!-- Top Right Wisdom Nexus Badge -->
    <div class="flex justify-end mb-6">
      <a href="EasternWisdom.html" 
         class="inline-flex items-center gap-2 px-5 py-2.5 text-sm font-medium text-stone-400/80 hover:text-stone-300 border border-stone-400/30 hover:border-stone-400/50 rounded-2xl transition-all backdrop-blur-md">
        <span>Eastern Wisdom</span>
      </a>
    </div>
    
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold tracking-tight mb-2">Western Wisdom Nexus</h1>
      <p class="text-gray-400 text-base">Explore the Foundational Pillars of Philosophy & Faith</p>
    </div>

    <div class="grid md:grid-cols-2 gap-5 md:gap-8">
    
    <!-- The Bible Card -->
    <a href="Bot/Bible.html" class="portal-card glass p-6 md:p-10 rounded-3xl">
      <div class="w-20 h-20 mx-auto bg-gradient-to-br from-purple-400 to-indigo-600 rounded-3xl flex items-center justify-center text-5xl shadow-2xl mb-5 text-zinc-950">
        <i class="fas fa-cross"></i>
      </div>
      <h2 class="text-2xl md:text-3xl font-bold mb-2 text-purple-400 text-center">The Bible</h2>
      <p class="text-gray-400 text-sm md:text-base leading-relaxed text-center">Spiritual parables and theological Wisdom</p>
    </a>

    <!-- Stoics Card -->
    <a href="Bot/Stoics.html" class="portal-card glass p-6 md:p-10 rounded-3xl">
      <div class="w-20 h-20 mx-auto bg-gradient-to-br from-slate-400 to-gray-500 rounded-3xl flex items-center justify-center text-5xl shadow-2xl mb-5 text-zinc-950">
        <i class="fas fa-building-columns"></i>
      </div>
      <h2 class="text-2xl md:text-3xl font-bold mb-2 text-slate-300 text-center">Stoics</h2>
      <p class="text-gray-400 text-sm md:text-base leading-relaxed text-center">Pragmatic logic of Aurelius, Seneca and Epictetus</p>
    </a>
    
    </div>

    <div class="text-center mt-10 text-gray-500 text-xs">
      Two timeless sources of Western wisdom
    </div>
  </div>
</body>
</html>
